<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About the owner – Apply for a motor vehicle inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-100': '#ffc726','bb-yellow-00': '#e8a833','bb-yellow-10': '#fff9e9',
            'bb-blue-100': '#00267f','bb-blue-40': '#99a8cc','bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000','bb-mid-grey-00': '#595959',
            'bb-white-00': '#ffffff','bb-red-00': '#a42c2c','bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64','bb-teal-100': '#30c0c8','bb-teal-10': '#eaf9f9',
            'bb-grey-00': '#e0e4e9','bb-green-00': '#00654a',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem' },
          borderRadius: { 'sm':'0.25rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
        }
      }
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,sans-serif; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; }
    .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  </style>
</head>
<body>
  <div id="site-header" class="bg-bb-yellow-100 bg-bb-blue-100 bg-bb-blue-10 text-bb-white-00 text-bb-black-00"></div>
  <main class="py-8">
    <div class="container">
      <div class="max-w-2xl mx-auto">

        <p class="text-[1rem] text-[#595959] mb-2">Step 2 of approximately 8</p>

        <a href="triage.html" class="inline-flex items-center gap-2 underline underline-offset-2 text-[#0e5f64] hover:text-black hover:bg-[#eaf9f9] mb-6">← Back</a>

        <!-- Error summary -->
        <div id="error-summary" class="hidden bg-[#fff0f0] border-2 border-[#a42c2c] p-4 mb-6 rounded">
          <h2 class="font-bold text-[1.25rem] text-[#a42c2c] mb-2">There is a problem</h2>
          <ul id="error-list" class="list-disc pl-4 text-[#a42c2c] space-y-1"></ul>
        </div>

        <p class="border-l-4 border-[#99a8cc] py-2 pl-4 text-[#595959] mb-2">Apply for a motor vehicle inspection</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About the owner</h1>

        <form novalidate class="space-y-8">

          <!-- Full name -->
          <div class="flex flex-col gap-2 w-full">
            <label for="full-name" class="block text-[1.25rem] leading-normal font-bold text-black">Full name</label>
            <p class="text-[#595959]">As it appears on your National Registration card</p>
            <div class="relative inline-flex w-full max-w-md rounded border-2 border-black items-center transition-all bg-white hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-within:ring-4 focus-within:ring-[#30c0c8]">
              <input type="text" id="full-name" name="full-name" class="w-full min-w-0 p-4 outline-none rounded placeholder:text-black/60" />
            </div>
          </div>

          <!-- Telephone -->
          <div class="flex flex-col gap-2 w-full">
            <label for="telephone" class="block text-[1.25rem] leading-normal font-bold text-black">Telephone number</label>
            <p class="text-[#595959]">For example, 246-1234</p>
            <div class="relative inline-flex w-full max-w-xs rounded border-2 border-black items-center transition-all bg-white hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-within:ring-4 focus-within:ring-[#30c0c8]">
              <input type="tel" id="telephone" name="telephone" placeholder="000-0000" class="w-full min-w-0 p-4 outline-none rounded placeholder:text-black/60" />
            </div>
          </div>

          <!-- Street address -->
          <div class="flex flex-col gap-2 w-full">
            <label for="street-address" class="block text-[1.25rem] leading-normal font-bold text-black">Street address</label>
            <div class="relative inline-flex w-full max-w-md rounded border-2 border-black items-center transition-all bg-white hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-within:ring-4 focus-within:ring-[#30c0c8]">
              <input type="text" id="street-address" name="street-address" class="w-full min-w-0 p-4 outline-none rounded placeholder:text-black/60" />
            </div>
          </div>

          <!-- Parish -->
          <div class="flex flex-col gap-2 w-full">
            <label for="parish" class="block text-[1.25rem] leading-normal font-bold text-black">Parish</label>
            <select id="parish" name="parish" class="w-full max-w-md p-4 rounded border-2 border-black bg-white focus:ring-4 focus:ring-[#30c0c8] outline-none">
              <option value="">Select a parish</option>
              <option>Christ Church</option>
              <option>St. Andrew</option>
              <option>St. George</option>
              <option>St. James</option>
              <option>St. John</option>
              <option>St. Joseph</option>
              <option>St. Lucy</option>
              <option>St. Michael</option>
              <option>St. Peter</option>
              <option>St. Philip</option>
              <option>St. Thomas</option>
            </select>
          </div>

          <!-- Postal code -->
          <div class="flex flex-col gap-2 w-full">
            <label for="postal-code" class="block text-[1.25rem] leading-normal font-bold text-black">Postal code</label>
            <p class="text-[#595959]">For example, BB11000</p>
            <div class="relative inline-flex w-full max-w-xs rounded border-2 border-black items-center transition-all bg-white hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-within:ring-4 focus-within:ring-[#30c0c8]">
              <input type="text" id="postal-code" name="postal-code" class="w-full min-w-0 p-4 outline-none rounded placeholder:text-black/60" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" onclick="handleContinue()"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-[#0e5f64] text-white hover:bg-[#1a777d] px-6 py-4 rounded text-[1.25rem] leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-[#30c0c8]">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>
  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>
  <script src="../../shared/chrome.js"></script>
  <script>injectChrome();</script>
  <script>
    function handleContinue() {
      const errors = [];
      const name = document.getElementById('full-name').value.trim();
      const tel = document.getElementById('telephone').value.trim();
      const addr = document.getElementById('street-address').value.trim();
      const parish = document.getElementById('parish').value;
      const postal = document.getElementById('postal-code').value.trim();
      if (!name) errors.push('Enter your full name');
      if (!tel || !/^\d{3}-\d{4}$/.test(tel)) errors.push('Enter a valid telephone number (for example, 246-1234)');
      if (!addr) errors.push('Enter your street address');
      if (!parish) errors.push('Select a parish');
      if (!postal || !/^BB\d{5}$/i.test(postal)) errors.push('Enter a valid postal code (for example, BB11000)');
      if (errors.length) {
        const summary = document.getElementById('error-summary');
        document.getElementById('error-list').innerHTML = errors.map(e => `<li>${e}</li>`).join('');
        summary.classList.remove('hidden');
        summary.scrollIntoView({ behavior: 'smooth' });
        return;
      }
      const existing = JSON.parse(localStorage.getItem('mvi-v2') || '{}');
      Object.assign(existing, { name, telephone: tel, address: addr, parish, postalCode: postal.toUpperCase() });
      localStorage.setItem('mvi-v2', JSON.stringify(existing));
      window.location.href = 'vehicle-identity.html';
    }
  </script>
</body>
</html>
