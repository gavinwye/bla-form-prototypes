<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule your inspection – Apply for a motor vehicle inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-100': '#ffc726','bb-yellow-00': '#e8a833','bb-yellow-10': '#fff9e9',
            'bb-blue-100': '#00267f','bb-blue-40': '#99a8cc','bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000','bb-mid-grey-00': '#595959',
            'bb-white-00': '#ffffff','bb-red-00': '#a42c2c','bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64','bb-teal-100': '#30c0c8','bb-teal-10': '#eaf9f9',
            'bb-grey-00': '#e0e4e9','bb-green-00': '#00654a',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem' },
          borderRadius: { 'sm':'0.25rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
        }
      }
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,sans-serif; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; }
    .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main class="py-8">
    <div class="container">
      <div class="max-w-2xl mx-auto">

        <a href="config-weight.html" class="inline-flex items-center gap-xs underline underline-offset-2 hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-8 block">← Back</a>

        <div class="mb-6">
          <p class="text-[1rem] text-bb-mid-grey-00 mb-2">Step 6 of 9</p>
          <div class="bg-bb-grey-00 rounded-full h-2 w-full max-w-sm">
            <div class="bg-bb-teal-00 h-2 rounded-full transition-all" style="width:66%"></div>
          </div>
        </div>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 rounded-sm p-s mb-6">
          <h2 class="font-bold text-[1.25rem] text-bb-red-00 mb-2">There is a problem</h2>
          <ul id="error-list" class="list-disc pl-6 text-bb-red-00 space-y-1"></ul>
        </div>

        <p class="border-l-4 border-bb-blue-40 py-xs pl-s text-bb-mid-grey-00 mb-2">Apply for a motor vehicle inspection</p>
        <h1 class="font-bold text-[2.5rem] leading-[1.15] mb-8">Schedule your inspection</h1>

        <form novalidate class="space-y-6">

          <div class="flex flex-col gap-xs">
            <label for="purpose-of-use" class="block text-[1.25rem] font-bold text-bb-black-00">Purpose of use</label>
            <p class="text-bb-mid-grey-00 text-[1.25rem]">For example, Private transport, Commercial delivery, Public hire</p>
            <p id="purpose-of-use-error" class="hidden text-bb-red-00 text-[1.1rem]"></p>
            <div id="purpose-of-use-wrap" class="relative inline-flex w-full max-w-md rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="purpose-of-use" name="purpose-of-use" class="w-full p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <div class="flex flex-col gap-xs">
            <p class="block text-[1.25rem] font-bold text-bb-black-00">Preferred examination date</p>
            <p class="text-bb-mid-grey-00 text-[1.25rem]">For example, 27 03 2007</p>
            <p id="date-error" class="hidden text-bb-red-00 text-[1.1rem]"></p>
            <div class="flex gap-s items-end flex-wrap">
              <div class="flex flex-col gap-xs">
                <label for="exam-day" class="text-[1.25rem] font-bold text-bb-black-00">Day</label>
                <div id="exam-day-wrap" class="relative inline-flex rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:5rem">
                  <input type="text" id="exam-day" name="exam-day" inputmode="numeric" maxlength="2" class="w-full p-s outline-none rounded-[inherit]" />
                </div>
              </div>
              <div class="flex flex-col gap-xs">
                <label for="exam-month" class="text-[1.25rem] font-bold text-bb-black-00">Month</label>
                <div id="exam-month-wrap" class="relative inline-flex rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:5rem">
                  <input type="text" id="exam-month" name="exam-month" inputmode="numeric" maxlength="2" class="w-full p-s outline-none rounded-[inherit]" />
                </div>
              </div>
              <div class="flex flex-col gap-xs">
                <label for="exam-year" class="text-[1.25rem] font-bold text-bb-black-00">Year</label>
                <div id="exam-year-wrap" class="relative inline-flex rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:7rem">
                  <input type="text" id="exam-year" name="exam-year" inputmode="numeric" maxlength="4" class="w-full p-s outline-none rounded-[inherit]" />
                </div>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-xs">
            <label for="exam-time" class="block text-[1.25rem] font-bold text-bb-black-00">Preferred examination time</label>
            <p class="text-bb-mid-grey-00 text-[1.25rem]">For example, 09:00 AM, 2:30 PM</p>
            <p id="exam-time-error" class="hidden text-bb-red-00 text-[1.1rem]"></p>
            <div id="exam-time-wrap" class="relative inline-flex rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:12rem">
              <input type="text" id="exam-time" name="exam-time" class="w-full p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <div class="flex gap-4">
            <button type="button" onclick="handleContinue()"
              class="inline-flex items-center justify-center bg-bb-teal-00 text-white px-xm py-s rounded-sm text-[1.25rem] leading-[1.7] hover:bg-[#1a777d] focus-visible:ring-4 focus-visible:ring-bb-teal-100 outline-none">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../shared/chrome.js"></script>
  <script>injectChrome();</script>
  <script>
    const saved = JSON.parse(localStorage.getItem('mvi-v5') || '{}');
    if (saved.purposeOfUse) document.getElementById('purpose-of-use').value = saved.purposeOfUse;
    if (saved.examDay) document.getElementById('exam-day').value = saved.examDay;
    if (saved.examMonth) document.getElementById('exam-month').value = saved.examMonth;
    if (saved.examYear) document.getElementById('exam-year').value = saved.examYear;
    if (saved.examTime) document.getElementById('exam-time').value = saved.examTime;

    function handleContinue() {
      const errors = [];
      document.getElementById('purpose-of-use-error').classList.add('hidden');
      document.getElementById('purpose-of-use-wrap').classList.remove('border-bb-red-00');
      document.getElementById('date-error').classList.add('hidden');
      ['exam-day-wrap','exam-month-wrap','exam-year-wrap'].forEach(id => document.getElementById(id).classList.remove('border-bb-red-00'));
      document.getElementById('exam-time-error').classList.add('hidden');
      document.getElementById('exam-time-wrap').classList.remove('border-bb-red-00');
      document.getElementById('error-summary').classList.add('hidden');
      document.getElementById('error-list').innerHTML = '';

      const purposeOfUse = document.getElementById('purpose-of-use').value.trim();
      const day = document.getElementById('exam-day').value.trim();
      const month = document.getElementById('exam-month').value.trim();
      const year = document.getElementById('exam-year').value.trim();
      const time = document.getElementById('exam-time').value.trim();

      if (!purposeOfUse) {
        errors.push('Purpose of use – Enter the purpose of use');
        document.getElementById('purpose-of-use-error').textContent = 'Enter the purpose of use';
        document.getElementById('purpose-of-use-error').classList.remove('hidden');
        document.getElementById('purpose-of-use-wrap').classList.add('border-bb-red-00');
      }

      if (!day || !month || !year) {
        errors.push('Preferred examination date – Enter a complete date');
        document.getElementById('date-error').textContent = 'Enter a complete date including day, month and year';
        document.getElementById('date-error').classList.remove('hidden');
        if (!day) document.getElementById('exam-day-wrap').classList.add('border-bb-red-00');
        if (!month) document.getElementById('exam-month-wrap').classList.add('border-bb-red-00');
        if (!year) document.getElementById('exam-year-wrap').classList.add('border-bb-red-00');
      } else {
        const entered = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
        const today = new Date(); today.setHours(0,0,0,0);
        if (isNaN(entered.getTime()) || entered <= today) {
          errors.push('Preferred examination date – Enter a future date');
          document.getElementById('date-error').textContent = 'The preferred date must be in the future';
          document.getElementById('date-error').classList.remove('hidden');
          ['exam-day-wrap','exam-month-wrap','exam-year-wrap'].forEach(id => document.getElementById(id).classList.add('border-bb-red-00'));
        }
      }

      if (!time) {
        errors.push('Preferred examination time – Enter a preferred time');
        document.getElementById('exam-time-error').textContent = 'Enter a preferred examination time';
        document.getElementById('exam-time-error').classList.remove('hidden');
        document.getElementById('exam-time-wrap').classList.add('border-bb-red-00');
      }

      if (errors.length > 0) {
        const list = document.getElementById('error-list');
        errors.forEach(e => { const li = document.createElement('li'); li.textContent = e; list.appendChild(li); });
        document.getElementById('error-summary').classList.remove('hidden');
        document.title = 'Error: Schedule your inspection – Apply for a motor vehicle inspection';
        window.scrollTo(0,0);
        return;
      }

      const data = JSON.parse(localStorage.getItem('mvi-v5') || '{}');
      data.purposeOfUse = purposeOfUse;
      data.examDay = day;
      data.examMonth = month;
      data.examYear = year;
      data.examTime = time;
      localStorage.setItem('mvi-v5', JSON.stringify(data));
      window.location.href = 'declaration.html';
    }
  </script>
</body>
</html>
