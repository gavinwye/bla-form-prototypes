<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get your documents ready – Apply for a motor vehicle inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-100': '#ffc726','bb-yellow-00': '#e8a833','bb-yellow-10': '#fff9e9',
            'bb-blue-100': '#00267f','bb-blue-40': '#99a8cc','bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000','bb-mid-grey-00': '#595959',
            'bb-white-00': '#ffffff','bb-red-00': '#a42c2c','bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64','bb-teal-100': '#30c0c8','bb-teal-10': '#eaf9f9',
            'bb-grey-00': '#e0e4e9','bb-green-00': '#00654a',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem' },
          borderRadius: { 'sm':'0.25rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
        }
      }
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,sans-serif; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; }
    .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main class="py-8">
    <div class="container">
      <div class="max-w-2xl mx-auto">

        <a href="eligibility.html" class="inline-flex items-center gap-xs underline underline-offset-2 hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-8 block">← Back</a>

        <p class="border-l-4 border-bb-blue-40 py-xs pl-s text-bb-mid-grey-00 mb-2">Before you start</p>
        <h1 class="font-bold text-[2.5rem] leading-[1.15] mb-4">Get your documents ready</h1>
        <p class="text-bb-mid-grey-00 mb-8">Before you begin your application, check you have the following. Tick each item to confirm.</p>

        <p id="checklist-counter" class="text-bb-mid-grey-00 mb-4 font-bold">0 of 5 confirmed</p>

        <div class="border-t border-bb-grey-00 mb-8">

          <div class="flex items-start gap-4 py-s border-b border-bb-grey-00">
            <button type="button" role="checkbox" aria-checked="false" data-item="1"
              class="doc-check mt-1 relative inline-flex size-8 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100">
            </button>
            <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Vehicle logbook</label>
          </div>

          <div class="flex items-start gap-4 py-s border-b border-bb-grey-00">
            <button type="button" role="checkbox" aria-checked="false" data-item="2"
              class="doc-check mt-1 relative inline-flex size-8 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100">
            </button>
            <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">National Registration card</label>
          </div>

          <div class="flex items-start gap-4 py-s border-b border-bb-grey-00">
            <button type="button" role="checkbox" aria-checked="false" data-item="3"
              class="doc-check mt-1 relative inline-flex size-8 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100">
            </button>
            <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Vehicle registration certificate (if the vehicle has been previously registered in Barbados)</label>
          </div>

          <div class="flex items-start gap-4 py-s border-b border-bb-grey-00">
            <button type="button" role="checkbox" aria-checked="false" data-item="4"
              class="doc-check mt-1 relative inline-flex size-8 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100">
            </button>
            <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Valid motor vehicle insurance certificate</label>
          </div>

          <div class="flex items-start gap-4 py-s border-b border-bb-grey-00">
            <button type="button" role="checkbox" aria-checked="false" data-item="5"
              class="doc-check mt-1 relative inline-flex size-8 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100">
            </button>
            <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">A preferred date and time for the inspection</label>
          </div>

        </div>

        <button id="continue-btn" type="button" onclick="window.location.href='inspection-type.html'"
          class="inline-flex items-center justify-center bg-bb-teal-00 text-white px-xm py-s rounded-sm text-[1.25rem] leading-[1.7] opacity-50 cursor-not-allowed focus-visible:ring-4 focus-visible:ring-bb-teal-100 outline-none"
          disabled>
          Continue
        </button>

      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../shared/chrome.js"></script>
  <script>injectChrome();</script>
  <script>
    const checkSvg = '<svg class="size-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>';

    document.querySelectorAll('.doc-check').forEach(btn => {
      btn.addEventListener('click', () => {
        const checked = btn.getAttribute('aria-checked') === 'true';
        btn.setAttribute('aria-checked', checked ? 'false' : 'true');
        btn.innerHTML = checked ? '' : checkSvg;
        updateCounter();
      });
    });

    function updateCounter() {
      const checked = document.querySelectorAll('.doc-check[aria-checked="true"]').length;
      const total = document.querySelectorAll('.doc-check').length;
      document.getElementById('checklist-counter').textContent = `${checked} of ${total} confirmed`;
      const btn = document.getElementById('continue-btn');
      if (checked === total) {
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btn.classList.add('hover:bg-[#1a777d]');
      } else {
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
        btn.classList.remove('hover:bg-[#1a777d]');
      }
    }
  </script>
</body>
</html>
