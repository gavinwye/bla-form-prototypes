<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About this inspection – Apply for a motor vehicle inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-100': '#ffc726','bb-yellow-00': '#e8a833','bb-yellow-10': '#fff9e9',
            'bb-blue-100': '#00267f','bb-blue-40': '#99a8cc','bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000','bb-mid-grey-00': '#595959',
            'bb-white-00': '#ffffff','bb-red-00': '#a42c2c','bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64','bb-teal-100': '#30c0c8','bb-teal-10': '#eaf9f9',
            'bb-grey-00': '#e0e4e9','bb-green-00': '#00654a',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem' },
          borderRadius: { 'sm':'0.25rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
        }
      }
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,sans-serif; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; }
    .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main class="py-8">
    <div class="container">
      <div class="max-w-2xl mx-auto">

        <p class="text-[1rem] text-[#595959] mb-2">Page 1 of 4</p>

        <a href="index.html" class="inline-flex items-center gap-2 underline underline-offset-2 text-[#0e5f64] hover:text-black hover:bg-[#eaf9f9] mb-6">← Back</a>

        <!-- Error summary -->
        <div id="error-summary" class="hidden bg-[#fff0f0] border-2 border-[#a42c2c] p-4 mb-6 rounded">
          <h2 class="font-bold text-[1.25rem] text-[#a42c2c] mb-2">There is a problem</h2>
          <ul id="error-list" class="list-disc pl-4 text-[#a42c2c] space-y-1"></ul>
        </div>

        <p class="border-l-4 border-[#99a8cc] py-2 pl-4 text-[#595959] mb-2">Apply for a motor vehicle inspection</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About this inspection</h1>

        <form novalidate class="space-y-8">

          <!-- Vehicle category -->
          <fieldset class="space-y-4">
            <legend class="font-bold text-[1.25rem] mb-2">Vehicle category</legend>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-category" data-value="private-car"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Private motor car</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-category" data-value="motorcycle"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Motor cycle</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-category" data-value="lorry"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Motor lorry / goods vehicle</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-category" data-value="psv"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Public service vehicle (bus, minibus, taxi)</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-category" data-value="agricultural"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Agricultural vehicle</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-category" data-value="special"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Special purpose vehicle</label>
            </div>
          </fieldset>

          <!-- Inspection purpose -->
          <fieldset class="space-y-4">
            <legend class="font-bold text-[1.25rem] mb-2">Inspection purpose</legend>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="inspection-purpose" data-value="initial"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Initial registration (new vehicle)</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="inspection-purpose" data-value="transfer"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Transfer of ownership</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="inspection-purpose" data-value="repairs"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Following repairs or modifications</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="inspection-purpose" data-value="other"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Other</label>
            </div>
          </fieldset>

          <!-- Previously registered -->
          <fieldset class="space-y-4">
            <legend class="font-bold text-[1.25rem] mb-2">Has this vehicle been previously registered in Barbados?</legend>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="previously-registered" data-value="yes"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">Yes</label>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="previously-registered" data-value="no"
                class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-white border-2 border-black rounded-full outline-none hover:cursor-pointer hover:shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.1)] focus-visible:ring-4 focus-visible:ring-[#30c0c8]">
              </button>
              <label class="text-[1.25rem] text-black cursor-pointer">No</label>
            </div>
          </fieldset>

          <!-- Registration number (conditional) -->
          <div id="reg-number-group" class="hidden flex-col gap-2">
            <label for="reg-number" class="block text-[1.25rem] font-bold">Registration number</label>
            <p class="text-[#595959]">For example, B123</p>
            <div class="border-2 border-black rounded w-full max-w-xs hover:shadow-[inset_4px_4px_0px_rgba(0,0,0,0.1)] focus-within:ring-4 focus-within:ring-[#30c0c8]">
              <input type="text" id="reg-number" name="reg-number" class="w-full p-4 outline-none rounded" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" onclick="handleContinue()"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-colors duration-200 outline-none bg-[#0e5f64] text-white hover:bg-[#1a777d] px-6 py-4 rounded text-[1.25rem] leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-[#30c0c8]">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../shared/chrome.js"></script>
  <script>injectChrome();</script>
  <script>
    document.querySelectorAll('.radio-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(`.radio-btn[data-group="${btn.dataset.group}"]`).forEach(b => {
          b.setAttribute('aria-checked','false');
          b.innerHTML='';
        });
        btn.setAttribute('aria-checked','true');
        btn.innerHTML = '<div class="w-5 h-5 rounded-full bg-black"></div>';
      });
    });

    document.querySelectorAll('.radio-btn[data-group="previously-registered"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const grp = document.getElementById('reg-number-group');
        grp.classList.toggle('hidden', btn.dataset.value !== 'yes');
        grp.classList.toggle('flex', btn.dataset.value === 'yes');
      });
    });

    function handleContinue() {
      const errors = [];
      const cat = document.querySelector('.radio-btn[data-group="vehicle-category"][aria-checked="true"]');
      const purpose = document.querySelector('.radio-btn[data-group="inspection-purpose"][aria-checked="true"]');
      const prevReg = document.querySelector('.radio-btn[data-group="previously-registered"][aria-checked="true"]');
      if (!cat) errors.push('Select a vehicle category');
      if (!purpose) errors.push('Select an inspection purpose');
      if (!prevReg) errors.push('Select whether the vehicle has been previously registered');
      if (errors.length) {
        const summary = document.getElementById('error-summary');
        document.getElementById('error-list').innerHTML = errors.map(e => `<li>${e}</li>`).join('');
        summary.classList.remove('hidden');
        summary.scrollIntoView({ behavior: 'smooth' });
        return;
      }
      const data = {
        category: cat.dataset.value,
        purpose: purpose.dataset.value,
        previouslyRegistered: prevReg.dataset.value,
        registrationNumber: prevReg.dataset.value === 'yes' ? document.getElementById('reg-number').value.trim() : ''
      };
      localStorage.setItem('mvi-v4', JSON.stringify(data));
      window.location.href = 'about-you-vehicle.html';
    }
  </script>
</body>
</html>
