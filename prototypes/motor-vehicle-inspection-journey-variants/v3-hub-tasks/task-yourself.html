<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About you – Apply for a motor vehicle inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-100': '#ffc726','bb-yellow-00': '#e8a833','bb-yellow-10': '#fff9e9',
            'bb-blue-100': '#00267f','bb-blue-40': '#99a8cc','bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000','bb-mid-grey-00': '#595959',
            'bb-white-00': '#ffffff','bb-red-00': '#a42c2c','bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64','bb-teal-100': '#30c0c8','bb-teal-10': '#eaf9f9',
            'bb-grey-00': '#e0e4e9','bb-green-00': '#00654a',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem' },
          borderRadius: { 'sm':'0.25rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
        }
      }
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,sans-serif; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; }
    .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main class="py-8">
    <div class="container">
      <div class="max-w-2xl mx-auto">

        <a href="hub.html" class="inline-flex items-center gap-xs underline underline-offset-2 hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-6">← Back</a>

        <p class="text-[0.875rem] text-bb-mid-grey-00 mb-4">Task 1 of 3 – About you</p>

        <p class="border-l-4 border-bb-blue-40 py-xs pl-s text-bb-mid-grey-00 mb-2">Apply for a motor vehicle inspection</p>
        <h1 class="font-bold text-[2.5rem] leading-[1.15] mb-8">Tell us about yourself</h1>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-s mb-6 rounded-sm">
          <h2 class="font-bold text-[1.25rem] text-bb-red-00 mb-2">There is a problem</h2>
          <ul id="error-list" class="list-disc pl-s text-bb-red-00 space-y-1"></ul>
        </div>

        <form novalidate class="space-y-8">

          <!-- Vehicle category -->
          <fieldset>
            <legend class="font-bold text-[1.25rem] text-bb-black-00 mb-4">What type of vehicle is this?</legend>
            <div id="category-error" class="hidden text-bb-red-00 font-bold mb-2"></div>
            <div class="space-y-3">
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="category" data-value="car" data-label="Private motor car"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Private motor car</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="category" data-value="motorcycle" data-label="Motor cycle"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Motor cycle</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="category" data-value="lorry" data-label="Motor lorry / goods vehicle"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Motor lorry / goods vehicle</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="category" data-value="psv" data-label="Public service vehicle (bus, minibus, taxi)"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Public service vehicle (bus, minibus, taxi)</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="category" data-value="agricultural" data-label="Agricultural vehicle"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Agricultural vehicle</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="category" data-value="special" data-label="Special purpose vehicle"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Special purpose vehicle</label>
              </div>
            </div>
          </fieldset>

          <!-- Inspection purpose -->
          <fieldset>
            <legend class="font-bold text-[1.25rem] text-bb-black-00 mb-4">What is the purpose of this inspection?</legend>
            <div id="purpose-error" class="hidden text-bb-red-00 font-bold mb-2"></div>
            <div class="space-y-3">
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="purpose" data-value="initial" data-label="Initial registration (new vehicle)"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Initial registration (new vehicle)</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="purpose" data-value="transfer" data-label="Transfer of ownership"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Transfer of ownership</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="purpose" data-value="repairs" data-label="Following repairs or modifications"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Following repairs or modifications</label>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="purpose" data-value="other" data-label="Other"
                  class="radio-btn relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"></button>
                <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Other</label>
              </div>
            </div>
          </fieldset>

          <!-- Full name -->
          <div class="flex flex-col gap-xs">
            <label for="owner-name" class="block text-[1.25rem] font-bold text-bb-black-00">Full name</label>
            <div id="owner-name-error" class="hidden text-bb-red-00 font-bold"></div>
            <div class="relative inline-flex w-full max-w-md rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" id="owner-name-wrap">
              <input type="text" id="owner-name" name="owner-name" autocomplete="name" class="w-full p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Telephone -->
          <div class="flex flex-col gap-xs">
            <label for="owner-phone" class="block text-[1.25rem] font-bold text-bb-black-00">Telephone number</label>
            <p class="text-bb-mid-grey-00">For example, 246-1234</p>
            <div id="owner-phone-error" class="hidden text-bb-red-00 font-bold"></div>
            <div class="relative inline-flex w-full max-w-xs rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" id="owner-phone-wrap">
              <input type="text" id="owner-phone" name="owner-phone" autocomplete="tel" class="w-full p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Street address -->
          <div class="flex flex-col gap-xs">
            <label for="owner-address" class="block text-[1.25rem] font-bold text-bb-black-00">Street address</label>
            <div id="owner-address-error" class="hidden text-bb-red-00 font-bold"></div>
            <div class="relative inline-flex w-full max-w-md rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" id="owner-address-wrap">
              <input type="text" id="owner-address" name="owner-address" autocomplete="street-address" class="w-full p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Parish -->
          <div class="flex flex-col gap-xs">
            <label for="owner-parish" class="block text-[1.25rem] font-bold text-bb-black-00">Parish</label>
            <div id="owner-parish-error" class="hidden text-bb-red-00 font-bold"></div>
            <div class="relative inline-flex w-full max-w-xs rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" id="owner-parish-wrap">
              <select id="owner-parish" name="owner-parish" class="w-full p-s outline-none rounded-[inherit] bg-transparent appearance-none">
                <option value="">Select a parish</option>
                <option>Christ Church</option>
                <option>St. Andrew</option>
                <option>St. George</option>
                <option>St. James</option>
                <option>St. John</option>
                <option>St. Joseph</option>
                <option>St. Lucy</option>
                <option>St. Michael</option>
                <option>St. Peter</option>
                <option>St. Philip</option>
                <option>St. Thomas</option>
              </select>
            </div>
          </div>

          <!-- Postal code -->
          <div class="flex flex-col gap-xs">
            <label for="owner-postal" class="block text-[1.25rem] font-bold text-bb-black-00">Postal code</label>
            <p class="text-bb-mid-grey-00">For example, BB11000</p>
            <div id="owner-postal-error" class="hidden text-bb-red-00 font-bold"></div>
            <div class="relative inline-flex w-full max-w-xs rounded-sm border-2 border-bb-black-00 bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" id="owner-postal-wrap">
              <input type="text" id="owner-postal" name="owner-postal" autocomplete="postal-code" class="w-full p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <div class="mt-8">
            <button type="button" onclick="handleSave()" class="inline-flex items-center justify-center bg-bb-teal-00 text-white px-xm py-s rounded-sm text-[1.25rem] leading-[1.7] hover:bg-[#1a777d] focus-visible:ring-4 focus-visible:ring-bb-teal-100">Save and continue</button>
          </div>

        </form>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../../shared/chrome.js"></script>
  <script>injectChrome();</script>
  <script>
    // Restore saved values
    const saved = JSON.parse(localStorage.getItem('mvi-v3') || '{}');
    if (saved.category) {
      const btn = document.querySelector(`.radio-btn[data-group="category"][data-value="${saved.category}"]`);
      if (btn) { btn.setAttribute('aria-checked','true'); btn.innerHTML = '<div class="size-5 rounded-full bg-bb-black-00"></div>'; }
    }
    if (saved.purpose) {
      const btn = document.querySelector(`.radio-btn[data-group="purpose"][data-value="${saved.purpose}"]`);
      if (btn) { btn.setAttribute('aria-checked','true'); btn.innerHTML = '<div class="size-5 rounded-full bg-bb-black-00"></div>'; }
    }
    if (saved.ownerName) document.getElementById('owner-name').value = saved.ownerName;
    if (saved.ownerPhone) document.getElementById('owner-phone').value = saved.ownerPhone;
    if (saved.ownerAddress) document.getElementById('owner-address').value = saved.ownerAddress;
    if (saved.ownerParish) document.getElementById('owner-parish').value = saved.ownerParish;
    if (saved.ownerPostal) document.getElementById('owner-postal').value = saved.ownerPostal;

    document.querySelectorAll('.radio-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        document.querySelectorAll(`.radio-btn[data-group="${group}"]`).forEach(b => { b.setAttribute('aria-checked','false'); b.innerHTML=''; });
        btn.setAttribute('aria-checked','true');
        btn.innerHTML = '<div class="size-5 rounded-full bg-bb-black-00"></div>';
      });
    });

    function setError(fieldId, msg) {
      const errEl = document.getElementById(fieldId + '-error');
      const wrapEl = document.getElementById(fieldId + '-wrap');
      if (errEl) { errEl.textContent = msg; errEl.classList.remove('hidden'); }
      if (wrapEl) { wrapEl.classList.remove('border-bb-black-00'); wrapEl.classList.add('border-bb-red-00'); }
      const input = document.getElementById(fieldId);
      if (input) input.setAttribute('aria-invalid','true');
    }

    function clearErrors() {
      document.querySelectorAll('[id$="-error"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('[id$="-wrap"]').forEach(el => { el.classList.remove('border-bb-red-00'); el.classList.add('border-bb-black-00'); });
      document.querySelectorAll('[aria-invalid]').forEach(el => el.removeAttribute('aria-invalid'));
    }

    function handleSave() {
      clearErrors();
      const errors = [];

      const categoryBtn = document.querySelector('.radio-btn[data-group="category"][aria-checked="true"]');
      if (!categoryBtn) { document.getElementById('category-error').textContent = 'Select a vehicle category'; document.getElementById('category-error').classList.remove('hidden'); errors.push('Select a vehicle category'); }

      const purposeBtn = document.querySelector('.radio-btn[data-group="purpose"][aria-checked="true"]');
      if (!purposeBtn) { document.getElementById('purpose-error').textContent = 'Select a purpose for this inspection'; document.getElementById('purpose-error').classList.remove('hidden'); errors.push('Select a purpose for this inspection'); }

      const name = document.getElementById('owner-name').value.trim();
      if (!name) { setError('owner-name','Enter the owner\'s full name'); errors.push('Enter the owner\'s full name'); }

      const phone = document.getElementById('owner-phone').value.trim();
      if (!phone) { setError('owner-phone','Enter a telephone number'); errors.push('Enter a telephone number'); }
      else if (!/^\d{3}-\d{4}$/.test(phone)) { setError('owner-phone','Enter a telephone number in the format 000-0000'); errors.push('Enter a telephone number in the format 000-0000'); }

      const address = document.getElementById('owner-address').value.trim();
      if (!address) { setError('owner-address','Enter a street address'); errors.push('Enter a street address'); }

      const parish = document.getElementById('owner-parish').value;
      if (!parish) { setError('owner-parish','Select a parish'); errors.push('Select a parish'); }

      const postal = document.getElementById('owner-postal').value.trim();
      if (!postal) { setError('owner-postal','Enter a postal code'); errors.push('Enter a postal code'); }
      else if (!/^BB\d{5}$/.test(postal)) { setError('owner-postal','Enter a postal code in the format BB##### (for example, BB11000)'); errors.push('Enter a postal code in the correct format'); }

      if (errors.length > 0) {
        const summary = document.getElementById('error-summary');
        summary.classList.remove('hidden');
        document.getElementById('error-list').innerHTML = errors.map(e => `<li>${e}</li>`).join('');
        summary.scrollIntoView({ behavior: 'smooth' });
        return;
      }

      const data = JSON.parse(localStorage.getItem('mvi-v3') || '{}');
      data.category = categoryBtn.dataset.value;
      data.categoryLabel = categoryBtn.dataset.label;
      data.purpose = purposeBtn.dataset.value;
      data.purposeLabel = purposeBtn.dataset.label;
      data.ownerName = name;
      data.ownerPhone = phone;
      data.ownerAddress = address;
      data.ownerParish = parish;
      data.ownerPostal = postal;
      data.task1Done = true;
      localStorage.setItem('mvi-v3', JSON.stringify(data));
      window.location.href = 'hub.html';
    }
  </script>
</body>
</html>
