<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your details – Change of Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="index.html"
          class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">
          ← Back
        </a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Change of Engine</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Your details</h1>

        <form novalidate class="space-y-8">

          <!-- Full name -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="fullName-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="fullName" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Full name</label>
            <div id="fullName-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="fullName" name="fullName" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <!-- Email address -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="email-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="email" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Email address</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">We will send a confirmation to this address</p>
            <div id="email-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="email" id="email" name="email" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    injectChrome();

    const STORAGE_KEY = 'change-of-engine';

    const saved = getData(STORAGE_KEY);
    if (saved.fullName) document.getElementById('fullName').value = saved.fullName;
    if (saved.email) document.getElementById('email').value = saved.email;

    document.getElementById('btn-continue').addEventListener('click', function () {
      const fields = [
        { id: 'fullName', label: 'Full name' },
        { id: 'email', label: 'Email address' },
      ];

      const errors = [];

      fields.forEach(f => {
        clearFieldError(f.id);
        const val = document.getElementById(f.id).value.trim();
        if (!val) {
          setFieldError(f.id, f.label + ' – Enter your ' + f.label.toLowerCase());
          errors.push({ fieldId: f.id, message: f.label + ' – Enter your ' + f.label.toLowerCase() });
        }
      });

      // Email format validation
      const emailVal = document.getElementById('email').value.trim();
      if (emailVal && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
        clearFieldError('email');
        setFieldError('email', 'Email address – Enter a valid email address');
        errors.push({ fieldId: 'email', message: 'Email address – Enter a valid email address' });
      }

      if (errors.length > 0) {
        showErrorSummary(errors);
        return;
      }

      hideErrorSummary();

      saveData({
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
      }, STORAGE_KEY);

      window.location.href = 'vehicle-details.html';
    });
  </script>
</body>
</html>
