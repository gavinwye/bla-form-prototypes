<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle configuration – Application for Inspection of a Motor Vehicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00':'#e8a833','bb-yellow-100':'#ffc726','bb-yellow-40':'#ffe9a8','bb-yellow-10':'#fff9e9',
            'bb-blue-00':'#00164a','bb-blue-100':'#00267f','bb-blue-40':'#99a8cc','bb-blue-10':'#e5e9f2',
            'bb-black-00':'#000000','bb-mid-grey-00':'#595959','bb-grey-00':'#e0e4e9','bb-white-00':'#ffffff',
            'bb-green-00':'#00654a','bb-green-100':'#1fbf84','bb-green-40':'#a5e5ce','bb-green-10':'#e9f9f3',
            'bb-red-00':'#a42c2c','bb-red-100':'#ff6b6b','bb-red-40':'#ffc4c4','bb-red-10':'#fff0f0',
            'bb-teal-00':'#0e5f64','bb-teal-100':'#30c0c8','bb-teal-40':'#ace6e9','bb-teal-10':'#eaf9f9',
            'bb-purple-00':'#4a235a','bb-purple-100':'#a962c7','bb-pink-00':'#ad1157','bb-pink-100':'#ff94d9',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','"Segoe UI"','Roboto','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem','xl':'8rem' },
          borderRadius: { 'sm':'0.25rem','md':'0.375rem','lg':'0.5rem' },
          boxShadow: { 'form-hover':'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display':'5rem','h1':'3.5rem','h2':'2.5rem','h3':'1.5rem','h4':'1.25rem','body-lg':'2rem','body':'1.25rem','caption':'1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,"system-ui","Segoe UI",Roboto,sans-serif; font-weight:400; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; -webkit-font-smoothing:antialiased; }
    .container { max-width:1200px; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">
        <a href="vehicle-specs.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-4 border-bb-red-00 p-s mb-m" tabindex="-1" role="alert" aria-labelledby="error-summary-title">
          <h2 id="error-summary-title" class="font-bold text-[1.25rem] text-bb-red-00 mb-xs">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-5 space-y-1 text-bb-red-00"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Application for Inspection of a Motor Vehicle</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Vehicle drive configuration</h1>

        <form novalidate class="space-y-8">

          <!-- Number of axles -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="numberOfAxles-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="numberOfAxles" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Number of axles</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 2</p>
            <div id="numberOfAxles-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:6rem;">
              <input type="text" id="numberOfAxles" name="numberOfAxles" inputmode="numeric" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Hand drive -->
          <fieldset class="border-0 p-0 m-0">
            <legend class="font-bold text-[1.25rem] leading-normal text-bb-black-00 mb-s">Is this vehicle left or right-hand drive?</legend>
            <p id="handDrive-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold mb-xs" role="alert"></p>
            <div class="flex flex-col gap-s">
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="handDrive" data-value="Right-hand drive" class="relative inline-flex items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100" style="width:3rem;height:3rem;flex-shrink:0;"></button>
                <span class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Right-hand drive</span>
              </div>
              <div class="flex gap-5 items-center">
                <button type="button" role="radio" aria-checked="false" data-group="handDrive" data-value="Left-hand drive" class="relative inline-flex items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-full transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100" style="width:3rem;height:3rem;flex-shrink:0;"></button>
                <span class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Left-hand drive</span>
              </div>
            </div>
          </fieldset>

          <div class="mt-8 flex gap-4">
            <button type="button" id="continue-btn" class="relative inline-flex items-center justify-center gap-2 text-[1.25rem] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] active:bg-[#0a4549] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>

  <script src="chrome.js"></script>
  <script>
    injectChrome();
    setupRadioGroup('handDrive');

    const d = getData();
    if (d.numberOfAxles) document.getElementById('numberOfAxles').value = d.numberOfAxles;
    if (d.handDrive) setRadioValue('handDrive', d.handDrive);

    document.getElementById('continue-btn').addEventListener('click', () => {
      const errors = [];
      hideErrorSummary();
      clearFieldError('numberOfAxles');
      document.getElementById('handDrive-error').classList.add('hidden');

      const axles = document.getElementById('numberOfAxles').value.trim();
      const drive = getRadioValue('handDrive');

      if (!axles) {
        errors.push({ fieldId: 'numberOfAxles', message: 'Number of axles – Enter the number of axles' });
        setFieldError('numberOfAxles', 'Enter the number of axles');
      } else if (!/^\d+$/.test(axles) || +axles < 1) {
        errors.push({ fieldId: 'numberOfAxles', message: 'Number of axles – Enter a valid number of axles' });
        setFieldError('numberOfAxles', 'Enter a valid number of axles');
      }

      if (!drive) {
        errors.push({ fieldId: 'handDrive', message: 'Hand drive – Select left or right-hand drive' });
        document.getElementById('handDrive-error').textContent = 'Select left or right-hand drive';
        document.getElementById('handDrive-error').classList.remove('hidden');
      }

      if (errors.length > 0) { showErrorSummary(errors); return; }

      saveData({ numberOfAxles: axles, handDrive: drive });
      window.location.href = 'weight-passengers.html';
    });
  </script>
</body>
</html>
