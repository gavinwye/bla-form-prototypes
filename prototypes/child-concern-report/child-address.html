<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Child's address – Report a concern about a child</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="child-details.html"
          class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">
          ← Back
        </a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Report a concern about a child</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Where does the child live or spend time?</h1>

        <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-m">
          Provide the address or a description of the location if you do not know the full address.
        </p>

        <form novalidate class="space-y-8">

          <!-- Street address -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="street-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="street" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Street address or location description</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 42 Bay Street or "the yellow house next to the school on Pine Road"</p>
            <div id="street-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="street" name="street" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <!-- Parish -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="parish-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="parish" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Parish <span class="font-normal text-bb-mid-grey-00">(if known)</span></label>
            <div id="parish-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <select id="parish" name="parish" class="w-full min-w-0 p-s outline-none rounded-[inherit] bg-transparent">
                <option value="">Select a parish</option>
                <option value="Christ Church">Christ Church</option>
                <option value="St. Andrew">St. Andrew</option>
                <option value="St. George">St. George</option>
                <option value="St. James">St. James</option>
                <option value="St. John">St. John</option>
                <option value="St. Joseph">St. Joseph</option>
                <option value="St. Lucy">St. Lucy</option>
                <option value="St. Michael">St. Michael</option>
                <option value="St. Peter">St. Peter</option>
                <option value="St. Philip">St. Philip</option>
                <option value="St. Thomas">St. Thomas</option>
              </select>
            </div>
          </div>

          <!-- School or other location -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="school-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="school" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Name of school, nursery, or other place the child attends <span class="font-normal text-bb-mid-grey-00">(if known)</span></label>
            <div id="school-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="school" name="school" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    injectChrome();

    const STORAGE_KEY = 'child-concern-report';

    const saved = getData(STORAGE_KEY);
    if (saved.childStreet) document.getElementById('street').value = saved.childStreet;
    if (saved.childParish) document.getElementById('parish').value = saved.childParish;
    if (saved.childSchool) document.getElementById('school').value = saved.childSchool;

    document.getElementById('btn-continue').addEventListener('click', function () {
      hideErrorSummary();
      const errors = [];

      clearFieldError('street');
      const street = document.getElementById('street').value.trim();
      if (!street) {
        setFieldError('street', 'Address – Enter the child\'s address or describe the location');
        errors.push({ fieldId: 'street', message: 'Address – Enter the child\'s address or describe the location' });
      }

      if (errors.length > 0) {
        showErrorSummary(errors);
        return;
      }

      saveData({
        childStreet: street,
        childParish: document.getElementById('parish').value,
        childSchool: document.getElementById('school').value.trim(),
      }, STORAGE_KEY);

      window.location.href = 'concern-type.html';
    });
  </script>
</body>
</html>
