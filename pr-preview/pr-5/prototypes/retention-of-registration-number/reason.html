<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why do you want to retain the registration number? – Retain Your Vehicle Registration Number</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }

    /* Custom styled checkbox */
    input[type="checkbox"].styled-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 2.5rem;
      height: 2.5rem;
      border: 2px solid #000;
      border-radius: 0.25rem;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background-color 0.1s, border-color 0.1s;
    }

    input[type="checkbox"].styled-checkbox:checked {
      background-color: #000;
      border-color: #000;
    }

    input[type="checkbox"].styled-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 10px;
      height: 16px;
      border: solid #fff;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg);
    }

    input[type="checkbox"].styled-checkbox:focus {
      outline: none;
      box-shadow: 0 0 0 4px #30c0c8;
    }

    input[type="checkbox"].styled-checkbox:hover {
      box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.1);
    }

    input[type="checkbox"].styled-checkbox:checked:hover {
      box-shadow: inset 4px 4px 0px 0px rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">
        <a href="registration-number.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1" role="alert">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Retain Your Vehicle Registration Number</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Why do you want to retain the registration number?</h1>

        <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-m">Select all that apply.</p>

        <form novalidate class="space-y-8">

          <fieldset class="border-0 p-0 m-0">
            <legend class="sr-only">Reason for retaining registration number</legend>
            <p id="reason-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold mb-s" role="alert"></p>

            <div class="flex flex-col gap-s" id="reason-group">

              <!-- Option 1 -->
              <div class="flex gap-4 items-start">
                <input type="checkbox" id="reason-total-loss" name="reason" value="total-loss"
                  class="styled-checkbox mt-1">
                <label for="reason-total-loss" class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer pt-1">The vehicle has been deemed a total loss</label>
              </div>

              <!-- Option 2 -->
              <div class="flex gap-4 items-start">
                <input type="checkbox" id="reason-under-repairs" name="reason" value="under-repairs"
                  class="styled-checkbox mt-1">
                <label for="reason-under-repairs" class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer pt-1">The vehicle is under repairs</label>
              </div>

              <!-- Option 3 -->
              <div class="flex gap-4 items-start">
                <input type="checkbox" id="reason-change-of-use" name="reason" value="change-of-use"
                  class="styled-checkbox mt-1">
                <label for="reason-change-of-use" class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer pt-1">The vehicle has been changed from private to commercial use</label>
              </div>

            </div>
          </fieldset>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    const STORAGE_KEY = 'retention-of-registration-number';

    injectChrome();

    // Pre-fill from localStorage
    const saved = getData(STORAGE_KEY);
    if (saved['reasons'] && Array.isArray(saved['reasons'])) {
      saved['reasons'].forEach(val => {
        const cb = document.querySelector(`input[name="reason"][value="${val}"]`);
        if (cb) cb.checked = true;
      });
    }

    document.getElementById('btn-continue').addEventListener('click', function () {
      const checkboxes = document.querySelectorAll('input[name="reason"]:checked');
      const selectedReasons = Array.from(checkboxes).map(cb => cb.value);

      const errorEl = document.getElementById('reason-error');
      if (selectedReasons.length === 0) {
        errorEl.textContent = 'Select at least one reason for retaining the registration number';
        errorEl.classList.remove('hidden');

        const summary = document.getElementById('error-summary');
        const list = document.getElementById('error-summary-list');
        list.innerHTML = '<li><a href="#reason-group" class="text-bb-red-00 underline">Select at least one reason for retaining the registration number</a></li>';
        summary.classList.remove('hidden');
        document.title = 'Error: Why do you want to retain the registration number? – Retain Your Vehicle Registration Number';
        summary.focus();
        return;
      }

      errorEl.textContent = '';
      errorEl.classList.add('hidden');
      document.getElementById('error-summary').classList.add('hidden');
      document.title = 'Why do you want to retain the registration number? – Retain Your Vehicle Registration Number';

      saveData({ 'reasons': selectedReasons }, STORAGE_KEY);
      window.location.href = 'check-answers.html';
    });
  </script>
</body>
</html>
