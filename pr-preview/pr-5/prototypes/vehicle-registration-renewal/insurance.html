<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance details – Register or Renew Your Motor Vehicle Licence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00':'#e8a833','bb-yellow-100':'#ffc726','bb-yellow-40':'#ffe9a8','bb-yellow-10':'#fff9e9',
            'bb-blue-00':'#00164a','bb-blue-100':'#00267f','bb-blue-40':'#99a8cc','bb-blue-10':'#e5e9f2',
            'bb-black-00':'#000000','bb-mid-grey-00':'#595959','bb-grey-00':'#e0e4e9','bb-white-00':'#ffffff',
            'bb-green-00':'#00654a','bb-green-100':'#1fbf84','bb-green-40':'#a5e5ce','bb-green-10':'#e9f9f3',
            'bb-red-00':'#a42c2c','bb-red-100':'#ff6b6b','bb-red-40':'#ffc4c4','bb-red-10':'#fff0f0',
            'bb-teal-00':'#0e5f64','bb-teal-100':'#30c0c8','bb-teal-40':'#ace6e9','bb-teal-10':'#eaf9f9',
            'bb-purple-00':'#4a235a','bb-purple-100':'#a962c7','bb-pink-00':'#ad1157','bb-pink-100':'#ff94d9',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','"Segoe UI"','Roboto','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem','xl':'8rem' },
          borderRadius: { 'sm':'0.25rem','md':'0.375rem','lg':'0.5rem' },
          boxShadow: { 'form-hover':'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display':'5rem','h1':'3.5rem','h2':'2.5rem','h3':'1.5rem','h4':'1.25rem','body-lg':'2rem','body':'1.25rem','caption':'1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,"system-ui","Segoe UI",Roboto,sans-serif; font-weight:400; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; -webkit-font-smoothing:antialiased; }
    .container { max-width:1200px; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="vehicle-capacity.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-4 border-bb-red-00 p-s mb-m" tabindex="-1" role="alert" aria-labelledby="error-summary-title">
          <h2 id="error-summary-title" class="font-bold text-[1.25rem] text-bb-red-00 mb-xs">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-5 space-y-1 text-bb-red-00"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Register or Renew Your Motor Vehicle Licence</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Insurance details</h1>

        <form novalidate class="space-y-8">

          <!-- Insurer name -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="insurerName-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="insurerName" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Insurer name</label>
            <div id="insurerName-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="insurerName" name="insurerName" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Policy number -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="policyNumber-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="policyNumber" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Policy number</label>
            <div id="policyNumber-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="max-width:24rem;">
              <input type="text" id="policyNumber" name="policyNumber" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Policy expiry date -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="insuranceExpiry-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <p class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Policy expiry date</p>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 27 03 2007</p>
            <div class="flex gap-s items-end flex-wrap">
              <!-- Day -->
              <div class="flex flex-col gap-xs">
                <label for="insuranceExpiry-day" class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Day</label>
                <div id="insuranceExpiry-day-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:5rem;">
                  <input type="text" id="insuranceExpiry-day" name="insuranceExpiry-day" inputmode="numeric" maxlength="2" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
                </div>
              </div>
              <!-- Month -->
              <div class="flex flex-col gap-xs">
                <label for="insuranceExpiry-month" class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Month</label>
                <div id="insuranceExpiry-month-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:5rem;">
                  <input type="text" id="insuranceExpiry-month" name="insuranceExpiry-month" inputmode="numeric" maxlength="2" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
                </div>
              </div>
              <!-- Year -->
              <div class="flex flex-col gap-xs">
                <label for="insuranceExpiry-year" class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Year</label>
                <div id="insuranceExpiry-year-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:7rem;">
                  <input type="text" id="insuranceExpiry-year" name="insuranceExpiry-year" inputmode="numeric" maxlength="4" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
                </div>
              </div>
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="continue-btn"
              class="relative inline-flex items-center justify-center gap-2 text-[1.25rem] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] active:bg-[#0a4549] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>

      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    const STORAGE_KEY = 'vehicle-registration-renewal';

    injectChrome();

    const d = getData(STORAGE_KEY);
    if (d.insurerName) document.getElementById('insurerName').value = d.insurerName;
    if (d.policyNumber) document.getElementById('policyNumber').value = d.policyNumber;
    if (d.insuranceExpiryDay) document.getElementById('insuranceExpiry-day').value = d.insuranceExpiryDay;
    if (d.insuranceExpiryMonth) document.getElementById('insuranceExpiry-month').value = d.insuranceExpiryMonth;
    if (d.insuranceExpiryYear) document.getElementById('insuranceExpiry-year').value = d.insuranceExpiryYear;

    function markDateError(prefix, msg) {
      ['day','month','year'].forEach(part => {
        const wrapper = document.getElementById(`${prefix}-${part}-wrapper`);
        if (wrapper) { wrapper.classList.remove('border-bb-black-00'); wrapper.classList.add('border-bb-red-00'); }
        const input = document.getElementById(`${prefix}-${part}`);
        if (input) input.setAttribute('aria-invalid','true');
      });
      const errorEl = document.getElementById(`${prefix}-error`);
      if (errorEl) { errorEl.textContent = msg; errorEl.classList.remove('hidden'); }
    }

    function clearDateError(prefix) {
      ['day','month','year'].forEach(part => {
        const wrapper = document.getElementById(`${prefix}-${part}-wrapper`);
        if (wrapper) { wrapper.classList.remove('border-bb-red-00'); wrapper.classList.add('border-bb-black-00'); }
        const input = document.getElementById(`${prefix}-${part}`);
        if (input) input.removeAttribute('aria-invalid');
      });
      const errorEl = document.getElementById(`${prefix}-error`);
      if (errorEl) errorEl.classList.add('hidden');
    }

    document.getElementById('continue-btn').addEventListener('click', () => {
      hideErrorSummary();
      clearFieldError('insurerName');
      clearFieldError('policyNumber');
      clearDateError('insuranceExpiry');

      const insurerName = document.getElementById('insurerName').value.trim();
      const policyNumber = document.getElementById('policyNumber').value.trim();
      const day = document.getElementById('insuranceExpiry-day').value.trim();
      const month = document.getElementById('insuranceExpiry-month').value.trim();
      const year = document.getElementById('insuranceExpiry-year').value.trim();
      const errors = [];

      if (!insurerName) {
        errors.push({ fieldId: 'insurerName', message: 'Insurer name – Enter the insurer name' });
        setFieldError('insurerName', 'Enter the insurer name');
      }
      if (!policyNumber) {
        errors.push({ fieldId: 'policyNumber', message: 'Policy number – Enter the policy number' });
        setFieldError('policyNumber', 'Enter the policy number');
      }

      let dateValid = true;
      if (!day || !month || !year) {
        dateValid = false;
        errors.push({ fieldId: 'insuranceExpiry-day', message: 'Policy expiry date – Enter the policy expiry date' });
        markDateError('insuranceExpiry', 'Enter the policy expiry date');
      } else {
        const d2 = parseInt(day), m2 = parseInt(month), y2 = parseInt(year);
        const expiryDate = new Date(y2, m2 - 1, d2);
        const today = new Date(); today.setHours(0,0,0,0);
        if (isNaN(expiryDate.getTime()) || d2 < 1 || d2 > 31 || m2 < 1 || m2 > 12 || y2 < 2000) {
          dateValid = false;
          errors.push({ fieldId: 'insuranceExpiry-day', message: 'Policy expiry date – Enter a valid date' });
          markDateError('insuranceExpiry', 'Enter a valid date');
        } else if (expiryDate <= today) {
          dateValid = false;
          errors.push({ fieldId: 'insuranceExpiry-day', message: 'Policy expiry date – The policy expiry date must be in the future' });
          markDateError('insuranceExpiry', 'The policy expiry date must be in the future');
        }
      }

      if (errors.length > 0) { showErrorSummary(errors); return; }

      saveData({
        insurerName,
        policyNumber,
        insuranceExpiryDay: day,
        insuranceExpiryMonth: month,
        insuranceExpiryYear: year
      }, STORAGE_KEY);
      window.location.href = 'examiner-certificate.html';
    });
  </script>
</body>
</html>
