<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle details – Odometer Reading Validation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="owner-details.html"
          class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">
          ← Back
        </a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Odometer Reading Validation</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Vehicle details</h1>

        <form novalidate class="space-y-8">

          <!-- Vehicle type radio -->
          <div class="flex flex-col gap-s items-start w-full">
            <p id="vehicle-type-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <p class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Vehicle type</p>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-type" data-value="Electric vehicle"
                class="relative inline-flex items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 border-solid rounded-full transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"
                style="width:3rem;height:3rem;flex-shrink:0;">
              </button>
              <span class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Electric vehicle</span>
            </div>
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="vehicle-type" data-value="Hybrid vehicle"
                class="relative inline-flex items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 border-solid rounded-full transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100"
                style="width:3rem;height:3rem;flex-shrink:0;">
              </button>
              <span class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">Hybrid vehicle</span>
            </div>
          </div>

          <!-- Motor number -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="motor-number-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="motor-number" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Motor number</label>
            <div id="motor-number-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="motor-number" name="motor-number" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Chassis number -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="chassis-number-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="chassis-number" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Chassis number</label>
            <div id="chassis-number-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="chassis-number" name="chassis-number" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    injectChrome();

    const STORAGE_KEY = 'odometer-reading-validation';

    setupRadioGroup('vehicle-type');

    const saved = getData(STORAGE_KEY);
    if (saved.vehicleType) setRadioValue('vehicle-type', saved.vehicleType);
    if (saved.motorNumber) document.getElementById('motor-number').value = saved.motorNumber;
    if (saved.chassisNumber) document.getElementById('chassis-number').value = saved.chassisNumber;

    document.getElementById('btn-continue').addEventListener('click', function () {
      const errors = [];

      // Clear all errors
      ['motor-number', 'chassis-number'].forEach(id => clearFieldError(id));
      const vehicleTypeErr = document.getElementById('vehicle-type-error');
      vehicleTypeErr.classList.add('hidden');
      hideErrorSummary();

      const vehicleType = getRadioValue('vehicle-type');
      if (!vehicleType) {
        vehicleTypeErr.textContent = 'Vehicle type – Select the type of vehicle';
        vehicleTypeErr.classList.remove('hidden');
        errors.push({ fieldId: 'vehicle-type-error', message: 'Vehicle type – Select the type of vehicle' });
      }

      const motorNumber = document.getElementById('motor-number').value.trim();
      if (!motorNumber) {
        setFieldError('motor-number', 'Motor number – Enter the motor number');
        errors.push({ fieldId: 'motor-number', message: 'Motor number – Enter the motor number' });
      }

      const chassisNumber = document.getElementById('chassis-number').value.trim();
      if (!chassisNumber) {
        setFieldError('chassis-number', 'Chassis number – Enter the chassis number');
        errors.push({ fieldId: 'chassis-number', message: 'Chassis number – Enter the chassis number' });
      }

      if (errors.length > 0) { showErrorSummary(errors); return; }

      saveData({ vehicleType, motorNumber, chassisNumber }, STORAGE_KEY);
      window.location.href = 'odometer.html';
    });
  </script>
</body>
</html>
