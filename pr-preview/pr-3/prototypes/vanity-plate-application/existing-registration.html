<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Existing vehicle registration – Application for an Approved Vanity Plate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">
        <a href="applicant-details.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1" role="alert">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Application for an Approved Vanity Plate</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Do you have an existing vehicle registration?</h1>

        <form novalidate class="space-y-8">

          <div class="flex flex-col gap-s items-start w-full" id="hasRegistration-group">
            <p id="hasRegistration-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>

            <!-- Yes -->
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="hasRegistration" data-value="yes"
                id="hasRegistration-yes"
                class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 border-solid rounded-full transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:border-bb-teal-00 focus-visible:shadow-none focus-visible:ring-4 focus-visible:ring-bb-teal-100">
              </button>
              <span class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer" onclick="selectOption('yes')">Yes</span>
            </div>

            <!-- No -->
            <div class="flex gap-5 items-center">
              <button type="button" role="radio" aria-checked="false" data-group="hasRegistration" data-value="no"
                id="hasRegistration-no"
                class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 border-solid rounded-full transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:border-bb-teal-00 focus-visible:shadow-none focus-visible:ring-4 focus-visible:ring-bb-teal-100">
              </button>
              <span class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer" onclick="selectOption('no')">No</span>
            </div>
          </div>

          <!-- Conditional: Registration number -->
          <div id="registration-number-reveal" class="hidden flex flex-col gap-xs w-full items-start">
            <p id="registration-number-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="registration-number" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Registration number</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">Enter your current vehicle registration number</p>
            <div id="registration-number-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="registration-number" name="registration-number" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" style="text-transform:uppercase;" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    const STORAGE_KEY = 'vanity-plate-application';

    injectChrome();

    let selectedOption = null;

    function selectOption(value) {
      selectedOption = value;
      const buttons = document.querySelectorAll('[data-group="hasRegistration"]');
      buttons.forEach(btn => { btn.setAttribute('aria-checked', 'false'); btn.innerHTML = ''; });
      const selected = document.getElementById('hasRegistration-' + value);
      if (selected) {
        selected.setAttribute('aria-checked', 'true');
        selected.innerHTML = '<span style="width:1.5rem;height:1.5rem;border-radius:9999px;background:#000;display:block;flex-shrink:0;"></span>';
      }
      clearRadioError();

      // Show/hide registration number field
      const reveal = document.getElementById('registration-number-reveal');
      if (value === 'yes') {
        reveal.classList.remove('hidden');
        reveal.classList.add('flex');
      } else {
        reveal.classList.add('hidden');
        reveal.classList.remove('flex');
        // Clear registration number if switching to 'no'
        const regInput = document.getElementById('registration-number');
        if (regInput) regInput.value = '';
        clearRegError();
      }
    }

    function clearRadioError() {
      const errorEl = document.getElementById('hasRegistration-error');
      errorEl.textContent = '';
      errorEl.classList.add('hidden');
      document.getElementById('error-summary').classList.add('hidden');
    }

    function clearRegError() {
      const errorEl = document.getElementById('registration-number-error');
      const wrapperEl = document.getElementById('registration-number-wrapper');
      if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }
      if (wrapperEl) { wrapperEl.classList.remove('border-bb-red-00'); wrapperEl.classList.add('border-bb-black-00'); }
      const inputEl = document.getElementById('registration-number');
      if (inputEl) inputEl.removeAttribute('aria-invalid');
    }

    setupRadioGroup('hasRegistration', function(value) {
      selectOption(value);
    });

    // Pre-fill from localStorage
    const saved = getData(STORAGE_KEY);
    if (saved['hasRegistration']) {
      selectOption(saved['hasRegistration']);
    }
    if (saved['registration-number']) {
      const regInput = document.getElementById('registration-number');
      if (regInput) regInput.value = saved['registration-number'];
    }

    // Uppercase transform on registration number
    document.getElementById('registration-number').addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });

    document.getElementById('btn-continue').addEventListener('click', function () {
      const errors = [];

      if (!selectedOption) {
        const errorEl = document.getElementById('hasRegistration-error');
        errorEl.textContent = 'Select yes if you have an existing vehicle registration';
        errorEl.classList.remove('hidden');
        errors.push({ id: 'hasRegistration-group', message: 'Select yes if you have an existing vehicle registration' });
      }

      if (selectedOption === 'yes') {
        const regVal = document.getElementById('registration-number').value.trim();
        if (!regVal) {
          const errorEl = document.getElementById('registration-number-error');
          const wrapperEl = document.getElementById('registration-number-wrapper');
          errorEl.textContent = 'Registration number – Enter your registration number';
          errorEl.classList.remove('hidden');
          wrapperEl.classList.remove('border-bb-black-00');
          wrapperEl.classList.add('border-bb-red-00');
          document.getElementById('registration-number').setAttribute('aria-invalid', 'true');
          errors.push({ id: 'registration-number', message: 'Registration number – Enter your registration number' });
        }
      }

      if (errors.length > 0) {
        const summary = document.getElementById('error-summary');
        const list = document.getElementById('error-summary-list');
        list.innerHTML = '';
        errors.forEach(e => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="#${e.id}" class="text-bb-red-00 underline">${e.message}</a>`;
          list.appendChild(li);
        });
        summary.classList.remove('hidden');
        document.title = 'Error: Existing vehicle registration – Application for an Approved Vanity Plate';
        summary.focus();
        return;
      }

      document.getElementById('error-summary').classList.add('hidden');
      document.title = 'Existing vehicle registration – Application for an Approved Vanity Plate';

      const regNum = selectedOption === 'yes' ? document.getElementById('registration-number').value.trim() : '';
      saveData({ 'hasRegistration': selectedOption, 'registration-number': regNum }, STORAGE_KEY);
      window.location.href = 'vanity-plate.html';
    });
  </script>
</body>
</html>
