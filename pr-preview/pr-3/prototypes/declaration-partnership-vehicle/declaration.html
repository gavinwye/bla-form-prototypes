<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Declaration – Declaration Form – Partnership Vehicle Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">
        <a href="vehicle-details.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1" role="alert">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Declaration – Partnership Vehicle Registration</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Declaration</h1>

        <form novalidate class="space-y-8">

          <div class="bg-bb-grey-00 p-m rounded-md border border-bb-mid-grey-00/30">
            <p class="text-[1.25rem] leading-normal" id="declaration-text">Loading declaration text…</p>
          </div>

          <div>
            <p id="decl-confirm-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold mb-xs" role="alert"></p>
            <div class="flex gap-4 items-start">
              <div id="decl-confirm-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100 flex-shrink-0" style="width:2.5rem;height:2.5rem;">
                <input type="checkbox" id="decl-confirm" name="decl-confirm" class="w-full h-full opacity-0 absolute cursor-pointer" />
                <span id="decl-confirm-tick" class="hidden w-full h-full flex items-center justify-center pointer-events-none">
                  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5"><path d="M4 10L8 14L16 6" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
              </div>
              <label for="decl-confirm" class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">I confirm that the information provided is true and correct, and I understand that making a false declaration is a criminal offence.</label>
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    const STORAGE_KEY = 'declaration-partnership-vehicle';
    injectChrome();

    const saved = getData(STORAGE_KEY);
    const authName = saved['auth-name'] || '[authorised partner name]';
    const bizName = saved['biz-name'] || '[partnership name]';

    document.getElementById('declaration-text').textContent =
      `I, ${authName}, on behalf of ${bizName}, hereby declare that the vehicle described herein will be used solely for the private use of the partnership and its members, and not for hire or reward.`;

    const checkbox = document.getElementById('decl-confirm');
    const tick = document.getElementById('decl-confirm-tick');
    if (saved['decl-confirmed'] === 'yes') {
      checkbox.checked = true;
      tick.classList.remove('hidden');
    }

    checkbox.addEventListener('change', function () {
      if (this.checked) { tick.classList.remove('hidden'); } else { tick.classList.add('hidden'); }
    });

    document.getElementById('btn-continue').addEventListener('click', function () {
      const errorEl = document.getElementById('decl-confirm-error');
      const wrapperEl = document.getElementById('decl-confirm-wrapper');

      if (!checkbox.checked) {
        errorEl.textContent = 'You must confirm the declaration to continue';
        errorEl.classList.remove('hidden');
        wrapperEl.classList.remove('border-bb-black-00');
        wrapperEl.classList.add('border-bb-red-00');

        const summary = document.getElementById('error-summary');
        const list = document.getElementById('error-summary-list');
        list.innerHTML = '<li><a href="#decl-confirm" class="text-bb-red-00 underline">You must confirm the declaration to continue</a></li>';
        summary.classList.remove('hidden');
        document.title = 'Error: Declaration – Declaration Form – Partnership Vehicle Registration';
        summary.focus();
        return;
      }

      errorEl.classList.add('hidden');
      wrapperEl.classList.remove('border-bb-red-00');
      wrapperEl.classList.add('border-bb-black-00');
      document.getElementById('error-summary').classList.add('hidden');

      saveData({ 'decl-confirmed': 'yes' }, STORAGE_KEY);
      window.location.href = 'check-answers.html';
    });
  </script>
</body>
</html>
