<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your answers – Apply for a motor vehicle inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-100': '#ffc726','bb-yellow-00': '#e8a833','bb-yellow-10': '#fff9e9',
            'bb-blue-100': '#00267f','bb-blue-40': '#99a8cc','bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000','bb-mid-grey-00': '#595959',
            'bb-white-00': '#ffffff','bb-red-00': '#a42c2c','bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64','bb-teal-100': '#30c0c8','bb-teal-10': '#eaf9f9',
            'bb-grey-00': '#e0e4e9','bb-green-00': '#00654a',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem' },
          borderRadius: { 'sm':'0.25rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
        }
      }
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,sans-serif; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; }
    .container { max-width:1200px; margin:0 auto; padding:0 1rem; }
    .summary-row { display:grid; grid-template-columns: 1fr 1fr auto; gap:1rem; padding:0.75rem 0; border-bottom:1px solid #e0e4e9; align-items:start; }
    .summary-row:last-child { border-bottom:none; }
    .change-link { color:#0e5f64; text-decoration:underline; white-space:nowrap; }
    .change-link:hover { color:#000; text-decoration:none; }
  </style>
</head>
<body>
  <div id="site-header" class="bg-bb-yellow-100 bg-bb-blue-100 bg-bb-blue-10 text-bb-white-00 text-bb-black-00"></div>
  <main class="py-8">
    <div class="container">
      <div class="max-w-2xl mx-auto">

        <a href="hub.html" class="inline-flex items-center gap-xs underline underline-offset-2 hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-6">← Back</a>

        <h1 class="font-bold text-[2.5rem] leading-[1.15] mb-8">Check your answers before submitting your application</h1>

        <div id="answers-container"></div>

        <!-- Declaration -->
        <div class="bg-bb-blue-10 p-s rounded-sm mb-6">
          <p class="font-bold mb-2">Declaration</p>
          <p>By submitting this application I declare that the information provided is true and correct to the best of my knowledge. I understand that providing false information is an offence under the laws of Barbados.</p>
        </div>

        <div class="mt-8">
          <button type="button" onclick="window.location.href='confirmation.html'" class="inline-flex items-center justify-center bg-bb-teal-00 text-white px-xm py-s rounded-sm text-[1.25rem] leading-[1.7] hover:bg-[#1a777d] focus-visible:ring-4 focus-visible:ring-bb-teal-100">Submit application</button>
        </div>

      </div>
    </div>
  </main>
  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>
  <script src="../../shared/chrome.js"></script>
  <script>injectChrome();</script>
  <script>
    const d = JSON.parse(localStorage.getItem('mvi-v3') || '{}');

    function row(label, value, page) {
      if (!value) return '';
      return `<div class="summary-row">
        <dt class="font-bold">${label}</dt>
        <dd>${value}</dd>
        <dd><a href="${page}" class="change-link">Change<span class="sr-only"> ${label.toLowerCase()}</span></a></dd>
      </div>`;
    }

    function section(title, rows) {
      const content = rows.filter(Boolean).join('');
      if (!content) return '';
      return `<div class="mb-8">
        <h2 class="font-bold text-[1.5rem] mb-4 pb-2 border-b-2 border-bb-black-00">${title}</h2>
        <dl>${content}</dl>
      </div>`;
    }

    const html = [
      section('About you', [
        row('Vehicle category', d.categoryLabel, 'task-yourself.html'),
        row('Inspection purpose', d.purposeLabel, 'task-yourself.html'),
        row('Full name', d.ownerName, 'task-yourself.html'),
        row('Telephone', d.ownerPhone, 'task-yourself.html'),
        row('Street address', d.ownerAddress, 'task-yourself.html'),
        row('Parish', d.ownerParish, 'task-yourself.html'),
        row('Postal code', d.ownerPostal, 'task-yourself.html'),
      ]),
      section('About your vehicle', [
        row('Previously registered in Barbados', d.prevReg === 'yes' ? 'Yes' : d.prevReg === 'no' ? 'No' : '', 'task-vehicle.html'),
        d.prevReg === 'yes' ? row('Registration number', d.regNumber, 'task-vehicle.html') : '',
        row('Manufacturer', d.manufacturer, 'task-vehicle.html'),
        row('Country of manufacture', d.countryManufacture, 'task-vehicle.html'),
        row('Description', d.description, 'task-vehicle.html'),
        row('Primary colour', d.colourPrimary, 'task-vehicle.html'),
        d.colourSecondary ? row('Secondary colour', d.colourSecondary, 'task-vehicle.html') : '',
        row('Engine number', d.engineNumber, 'task-vehicle.html'),
        row('Chassis / VIN number', d.chassisVin, 'task-vehicle.html'),
        row('Year manufactured', d.yearManufactured, 'task-vehicle.html'),
        row('Number of cylinders', d.cylinders, 'task-vehicle.html'),
        row('Engine capacity (cc)', d.engineCapacity, 'task-vehicle.html'),
        row('Number of axles', d.axles, 'task-vehicle.html'),
        d.handDrive ? row('Hand drive', d.handDrive.charAt(0).toUpperCase() + d.handDrive.slice(1), 'task-vehicle.html') : '',
        row('Weight certificate (kg)', d.weightCert, 'task-vehicle.html'),
        row('Gross weight (kg)', d.grossWeight, 'task-vehicle.html'),
        row('Number of passengers', d.passengers, 'task-vehicle.html'),
      ]),
      section('Your inspection', [
        row('Purpose of use', d.purposeUse, 'task-book.html'),
        row('Preferred date', d.examDate, 'task-book.html'),
        row('Preferred time', d.examTime, 'task-book.html'),
      ]),
    ].join('');

    document.getElementById('answers-container').innerHTML = html;
  </script>
</body>
</html>
