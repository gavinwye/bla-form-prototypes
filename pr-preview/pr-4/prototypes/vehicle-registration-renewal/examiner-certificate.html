<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examiner's certificate – Register or Renew Your Motor Vehicle Licence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00':'#e8a833','bb-yellow-100':'#ffc726','bb-yellow-40':'#ffe9a8','bb-yellow-10':'#fff9e9',
            'bb-blue-00':'#00164a','bb-blue-100':'#00267f','bb-blue-40':'#99a8cc','bb-blue-10':'#e5e9f2',
            'bb-black-00':'#000000','bb-mid-grey-00':'#595959','bb-grey-00':'#e0e4e9','bb-white-00':'#ffffff',
            'bb-green-00':'#00654a','bb-green-100':'#1fbf84','bb-green-40':'#a5e5ce','bb-green-10':'#e9f9f3',
            'bb-red-00':'#a42c2c','bb-red-100':'#ff6b6b','bb-red-40':'#ffc4c4','bb-red-10':'#fff0f0',
            'bb-teal-00':'#0e5f64','bb-teal-100':'#30c0c8','bb-teal-40':'#ace6e9','bb-teal-10':'#eaf9f9',
            'bb-purple-00':'#4a235a','bb-purple-100':'#a962c7','bb-pink-00':'#ad1157','bb-pink-100':'#ff94d9',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','"Segoe UI"','Roboto','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem','xl':'8rem' },
          borderRadius: { 'sm':'0.25rem','md':'0.375rem','lg':'0.5rem' },
          boxShadow: { 'form-hover':'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display':'5rem','h1':'3.5rem','h2':'2.5rem','h3':'1.5rem','h4':'1.25rem','body-lg':'2rem','body':'1.25rem','caption':'1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,"system-ui","Segoe UI",Roboto,sans-serif; font-weight:400; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; -webkit-font-smoothing:antialiased; }
    .container { max-width:1200px; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="insurance.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-4 border-bb-red-00 p-s mb-m" tabindex="-1" role="alert" aria-labelledby="error-summary-title">
          <h2 id="error-summary-title" class="font-bold text-[1.25rem] text-bb-red-00 mb-xs">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-5 space-y-1 text-bb-red-00"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Register or Renew Your Motor Vehicle Licence</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Examiner's certificate</h1>

        <form novalidate class="space-y-8">

          <!-- Certificate number -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="certNumber-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="certNumber" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Certificate number</label>
            <div id="certNumber-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="max-width:20rem;">
              <input type="text" id="certNumber" name="certNumber" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Examiner's name -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="examinerName-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="examinerName" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Examiner's name</label>
            <div id="examinerName-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="examinerName" name="examinerName" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Date issued -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="certDateIssued-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <p class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Date issued</p>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 27 03 2007</p>
            <div class="flex gap-s items-end flex-wrap">
              <div class="flex flex-col gap-xs">
                <label for="certDateIssued-day" class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Day</label>
                <div id="certDateIssued-day-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:5rem;">
                  <input type="text" id="certDateIssued-day" name="certDateIssued-day" inputmode="numeric" maxlength="2" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
                </div>
              </div>
              <div class="flex flex-col gap-xs">
                <label for="certDateIssued-month" class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Month</label>
                <div id="certDateIssued-month-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:5rem;">
                  <input type="text" id="certDateIssued-month" name="certDateIssued-month" inputmode="numeric" maxlength="2" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
                </div>
              </div>
              <div class="flex flex-col gap-xs">
                <label for="certDateIssued-year" class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Year</label>
                <div id="certDateIssued-year-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:7rem;">
                  <input type="text" id="certDateIssued-year" name="certDateIssued-year" inputmode="numeric" maxlength="4" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
                </div>
              </div>
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="continue-btn"
              class="relative inline-flex items-center justify-center gap-2 text-[1.25rem] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] active:bg-[#0a4549] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>

      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    const STORAGE_KEY = 'vehicle-registration-renewal';

    injectChrome();

    const d = getData(STORAGE_KEY);
    if (d.certNumber) document.getElementById('certNumber').value = d.certNumber;
    if (d.examinerName) document.getElementById('examinerName').value = d.examinerName;
    if (d.certDateIssuedDay) document.getElementById('certDateIssued-day').value = d.certDateIssuedDay;
    if (d.certDateIssuedMonth) document.getElementById('certDateIssued-month').value = d.certDateIssuedMonth;
    if (d.certDateIssuedYear) document.getElementById('certDateIssued-year').value = d.certDateIssuedYear;

    function markDateError(prefix, msg) {
      ['day','month','year'].forEach(part => {
        const wrapper = document.getElementById(`${prefix}-${part}-wrapper`);
        if (wrapper) { wrapper.classList.remove('border-bb-black-00'); wrapper.classList.add('border-bb-red-00'); }
        const input = document.getElementById(`${prefix}-${part}`);
        if (input) input.setAttribute('aria-invalid','true');
      });
      const errorEl = document.getElementById(`${prefix}-error`);
      if (errorEl) { errorEl.textContent = msg; errorEl.classList.remove('hidden'); }
    }

    function clearDateError(prefix) {
      ['day','month','year'].forEach(part => {
        const wrapper = document.getElementById(`${prefix}-${part}-wrapper`);
        if (wrapper) { wrapper.classList.remove('border-bb-red-00'); wrapper.classList.add('border-bb-black-00'); }
        const input = document.getElementById(`${prefix}-${part}`);
        if (input) input.removeAttribute('aria-invalid');
      });
      const errorEl = document.getElementById(`${prefix}-error`);
      if (errorEl) errorEl.classList.add('hidden');
    }

    document.getElementById('continue-btn').addEventListener('click', () => {
      hideErrorSummary();
      clearFieldError('certNumber');
      clearFieldError('examinerName');
      clearDateError('certDateIssued');

      const certNumber = document.getElementById('certNumber').value.trim();
      const examinerName = document.getElementById('examinerName').value.trim();
      const day = document.getElementById('certDateIssued-day').value.trim();
      const month = document.getElementById('certDateIssued-month').value.trim();
      const year = document.getElementById('certDateIssued-year').value.trim();
      const errors = [];

      if (!certNumber) {
        errors.push({ fieldId: 'certNumber', message: 'Certificate number – Enter the certificate number' });
        setFieldError('certNumber', 'Enter the certificate number');
      }
      if (!examinerName) {
        errors.push({ fieldId: 'examinerName', message: "Examiner's name – Enter the examiner's name" });
        setFieldError('examinerName', "Enter the examiner's name");
      }

      if (!day || !month || !year) {
        errors.push({ fieldId: 'certDateIssued-day', message: 'Date issued – Enter the date the certificate was issued' });
        markDateError('certDateIssued', 'Enter the date the certificate was issued');
      } else {
        const d2 = parseInt(day), m2 = parseInt(month), y2 = parseInt(year);
        if (d2 < 1 || d2 > 31 || m2 < 1 || m2 > 12 || y2 < 1900) {
          errors.push({ fieldId: 'certDateIssued-day', message: 'Date issued – Enter a valid date' });
          markDateError('certDateIssued', 'Enter a valid date');
        }
      }

      if (errors.length > 0) { showErrorSummary(errors); return; }

      saveData({
        certNumber,
        examinerName,
        certDateIssuedDay: day,
        certDateIssuedMonth: month,
        certDateIssuedYear: year
      }, STORAGE_KEY);

      // Branch: new registration → first-registration-extras, renewal → declaration
      const stored = getData(STORAGE_KEY);
      if (stored.registrationType === 'new') {
        window.location.href = 'first-registration-extras.html';
      } else {
        window.location.href = 'declaration.html';
      }
    });
  </script>
</body>
</html>
