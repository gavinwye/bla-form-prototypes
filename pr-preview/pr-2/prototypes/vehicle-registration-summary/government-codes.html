<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Government codes – Vehicle Registration Summary Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00':'#e8a833','bb-yellow-100':'#ffc726','bb-yellow-40':'#ffe9a8','bb-yellow-10':'#fff9e9',
            'bb-blue-00':'#00164a','bb-blue-100':'#00267f','bb-blue-40':'#99a8cc','bb-blue-10':'#e5e9f2',
            'bb-black-00':'#000000','bb-mid-grey-00':'#595959','bb-grey-00':'#e0e4e9','bb-white-00':'#ffffff',
            'bb-green-00':'#00654a','bb-green-100':'#1fbf84','bb-green-40':'#a5e5ce','bb-green-10':'#e9f9f3',
            'bb-red-00':'#a42c2c','bb-red-100':'#ff6b6b','bb-red-40':'#ffc4c4','bb-red-10':'#fff0f0',
            'bb-teal-00':'#0e5f64','bb-teal-100':'#30c0c8','bb-teal-40':'#ace6e9','bb-teal-10':'#eaf9f9',
            'bb-purple-00':'#4a235a','bb-purple-100':'#a962c7','bb-pink-00':'#ad1157','bb-pink-100':'#ff94d9',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','"Segoe UI"','Roboto','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem','xl':'8rem' },
          borderRadius: { 'sm':'0.25rem','md':'0.375rem','lg':'0.5rem' },
          boxShadow: { 'form-hover':'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display':'5rem','h1':'3.5rem','h2':'2.5rem','h3':'1.5rem','h4':'1.25rem','body-lg':'2rem','body':'1.25rem','caption':'1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,"system-ui","Segoe UI",Roboto,sans-serif; font-weight:400; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; -webkit-font-smoothing:antialiased; }
    .container { max-width:1200px; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="owner-1-details.html"
          class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m">
          ← Back
        </a>

        <!-- Error summary -->
        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-s mb-m rounded-sm" role="alert" tabindex="-1">
          <h2 class="font-bold text-[1.25rem] text-bb-red-00 mb-xs">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-5 space-y-xs text-[1.25rem]"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-s">Vehicle Registration Summary Sheet</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Government codes</h1>

        <form novalidate id="page-form">
          <div class="space-y-8">

            <!-- Government code -->
            <div class="flex flex-col gap-xs w-full items-start">
              <p id="gov-code-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
              <label for="gov-code" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Government code</label>
              <div id="gov-code-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
                <input type="text" id="gov-code" name="gov-code" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
              </div>
            </div>

            <!-- Dependency code -->
            <div class="flex flex-col gap-xs w-full items-start">
              <p id="dep-code-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
              <label for="dep-code" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Dependency code</label>
              <div id="dep-code-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
                <input type="text" id="dep-code" name="dep-code" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
              </div>
            </div>

          </div>

          <div class="mt-8 flex gap-4">
            <button type="submit"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] hover:shadow-[inset_0_0_0_4px_rgba(222,245,246,0.10)] active:bg-[#0a4549] active:shadow-[inset_0_0_0_3px_rgba(0,0,0,0.20)] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100 focus-visible:rounded-sm">
              Continue
            </button>
          </div>
        </form>

      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    injectChrome();

    const saved = getData('vehicle-registration-summary');

    if (saved.govCode) document.getElementById('gov-code').value = saved.govCode;
    if (saved.depCode) document.getElementById('dep-code').value = saved.depCode;

    document.getElementById('page-form').addEventListener('submit', function(e) {
      e.preventDefault();
      hideErrorSummary();

      const govCode = document.getElementById('gov-code').value.trim();
      const depCode = document.getElementById('dep-code').value.trim();

      const errors = [];

      if (!govCode) {
        setFieldError('gov-code', 'Government code – Enter the government code');
        errors.push({ fieldId: 'gov-code', message: 'Government code – Enter the government code' });
      } else { clearFieldError('gov-code'); }

      if (!depCode) {
        setFieldError('dep-code', 'Dependency code – Enter the dependency code');
        errors.push({ fieldId: 'dep-code', message: 'Dependency code – Enter the dependency code' });
      } else { clearFieldError('dep-code'); }

      if (errors.length > 0) {
        showErrorSummary(errors);
        return;
      }

      saveData({ govCode, depCode }, 'vehicle-registration-summary');
      window.location.href = 'financier.html';
    });
  </script>
</body>
</html>
