<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your answers – Request to Change the Colour of Vehicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00':'#e8a833','bb-yellow-100':'#ffc726','bb-yellow-40':'#ffe9a8','bb-yellow-10':'#fff9e9',
            'bb-blue-00':'#00164a','bb-blue-100':'#00267f','bb-blue-40':'#99a8cc','bb-blue-10':'#e5e9f2',
            'bb-black-00':'#000000','bb-mid-grey-00':'#595959','bb-grey-00':'#e0e4e9','bb-white-00':'#ffffff',
            'bb-green-00':'#00654a','bb-green-100':'#1fbf84','bb-green-40':'#a5e5ce','bb-green-10':'#e9f9f3',
            'bb-red-00':'#a42c2c','bb-red-100':'#ff6b6b','bb-red-40':'#ffc4c4','bb-red-10':'#fff0f0',
            'bb-teal-00':'#0e5f64','bb-teal-100':'#30c0c8','bb-teal-40':'#ace6e9','bb-teal-10':'#eaf9f9',
            'bb-purple-00':'#4a235a','bb-purple-100':'#a962c7','bb-pink-00':'#ad1157','bb-pink-100':'#ff94d9',
          },
          fontFamily: { sans: ['Figtree','-apple-system','system-ui','"Segoe UI"','Roboto','sans-serif'] },
          spacing: { 'xs':'0.5rem','s':'1rem','xm':'1.5rem','m':'2rem','l':'4rem','xl':'8rem' },
          borderRadius: { 'sm':'0.25rem','md':'0.375rem','lg':'0.5rem' },
          boxShadow: { 'form-hover':'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display':'5rem','h1':'3.5rem','h2':'2.5rem','h3':'1.5rem','h4':'1.25rem','body-lg':'2rem','body':'1.25rem','caption':'1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree,-apple-system,"system-ui","Segoe UI",Roboto,sans-serif; font-weight:400; font-size:1.25rem; line-height:1.5; display:grid; min-height:100vh; grid-template-rows:auto 1fr auto; background:#fff; color:#000; -webkit-font-smoothing:antialiased; }
    .container { max-width:1200px; }
    .summary-row { display:grid; grid-template-columns:1fr 1fr auto; gap:1rem; padding:0.75rem 0; border-bottom:1px solid #e0e4e9; align-items:start; }
    .summary-row:first-child { border-top:1px solid #e0e4e9; }
    .summary-key { font-weight:600; color:#000; font-size:1.25rem; }
    .summary-val { color:#000; word-break:break-word; font-size:1.25rem; }
    .summary-action a { color:#0e5f64; text-decoration:underline; text-underline-offset:2px; white-space:nowrap; font-size:1.25rem; }
    .summary-action a:hover { text-decoration:none; color:#000; background:#eaf9f9; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">
        <a href="colour-change.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">← Back</a>

        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Check your answers before sending your request</h1>

        <!-- Your details -->
        <h2 class="font-bold text-[1.5rem] mt-m mb-xs">Your details</h2>
        <div id="section-owner"></div>

        <!-- Vehicle details -->
        <h2 class="font-bold text-[1.5rem] mt-m mb-xs">Vehicle details</h2>
        <div id="section-vehicle"></div>

        <!-- Colour change -->
        <h2 class="font-bold text-[1.5rem] mt-m mb-xs">Colour change</h2>
        <div id="section-colour"></div>

        <div class="mt-m">
          <button type="button" id="submit-btn" class="relative inline-flex items-center justify-center gap-2 text-[1.25rem] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] active:bg-[#0a4549] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
            Send request
          </button>
        </div>

      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white py-m"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    injectChrome();

    const STORAGE_KEY = 'change-of-vehicle-colour';
    const d = getData(STORAGE_KEY);

    function row(label, value, changePage, changeLabel) {
      const displayVal = value || '<span style="color:#595959;">Not provided</span>';
      const srLabel = changeLabel || label.toLowerCase();
      return `<div class="summary-row">
        <span class="summary-key">${label}</span>
        <span class="summary-val">${displayVal}</span>
        <span class="summary-action"><a href="${changePage}">Change<span class="sr-only"> ${srLabel}</span></a></span>
      </div>`;
    }

    function formatDate(day, month, year) {
      if (!day && !month && !year) return '';
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const m = parseInt(month, 10);
      return [day, months[m-1] || month, year].filter(Boolean).join(' ');
    }

    // Your details section
    let ownerRows = '';
    ownerRows += row('Full name', d.fullName, 'owner-details.html', 'full name');
    ownerRows += row('Address', d.address ? d.address.replace(/\n/g, '<br>') : '', 'owner-details.html', 'address');
    ownerRows += row('Date of birth', formatDate(d.dobDay, d.dobMonth, d.dobYear), 'owner-details.html', 'date of birth');
    ownerRows += row('National Registration Number', d.nrn, 'owner-details.html', 'national registration number');
    ownerRows += row('Contact number', d.contactNumber, 'owner-details.html', 'contact number');
    ownerRows += row('Email address', d.email, 'owner-details.html', 'email address');
    document.getElementById('section-owner').innerHTML = ownerRows;

    // Vehicle details section
    let vehicleRows = '';
    vehicleRows += row('Registration number', d.registrationNumber, 'vehicle-details.html', 'registration number');
    vehicleRows += row('Vehicle type', d.vehicleType, 'vehicle-details.html', 'vehicle type');
    vehicleRows += row('Chassis number', d.chassisNumber, 'vehicle-details.html', 'chassis number');
    vehicleRows += row('Engine number', d.engineNumber || '', 'vehicle-details.html', 'engine number');
    vehicleRows += row('Motor number', d.motorNumber || '', 'vehicle-details.html', 'motor number');
    document.getElementById('section-vehicle').innerHTML = vehicleRows;

    // Colour change section
    let colourRows = '';
    colourRows += row('Current colour', d.currentColour, 'colour-change.html', 'current colour');
    colourRows += row('New colour', d.newColour, 'colour-change.html', 'new colour');
    document.getElementById('section-colour').innerHTML = colourRows;

    document.getElementById('submit-btn').addEventListener('click', () => {
      // Save a submitted flag so confirmation can reuse saved ref
      saveData({ submitted: true }, STORAGE_KEY);
      window.location.href = 'confirmation.html';
    });
  </script>
</body>
</html>
