<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle details – Register Your Vehicle for a Temporary Stay in Barbados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">

        <a href="applicant-details.html"
          class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 mb-m block">
          ← Back
        </a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m rounded-sm" tabindex="-1" role="alert" aria-labelledby="error-summary-title">
          <h2 id="error-summary-title" class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Register Your Vehicle for a Temporary Stay in Barbados</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Vehicle details</h1>

        <form novalidate class="space-y-8">

          <!-- Make -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="make-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="make" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Make</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, Toyota, Ford, BMW</p>
            <div id="make-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="make" name="make" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <!-- Model -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="model-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="model" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Model</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, Corolla, F-150, 3 Series</p>
            <div id="model-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="model" name="model" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <!-- Year -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="year-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="year" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Year</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 2022</p>
            <div id="year-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width: 10rem;">
              <input type="text" id="year" name="year" inputmode="numeric" maxlength="4" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <!-- Colour -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="colour-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="colour" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Colour</label>
            <div id="colour-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="colour" name="colour" class="w-full min-w-0 p-s outline-none rounded-[inherit] placeholder:text-bb-black-00/60" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    injectChrome();

    const STORAGE_KEY = 'registration-temporary-stay';

    const saved = getData(STORAGE_KEY);
    if (saved.make) document.getElementById('make').value = saved.make;
    if (saved.model) document.getElementById('model').value = saved.model;
    if (saved.year) document.getElementById('year').value = saved.year;
    if (saved.colour) document.getElementById('colour').value = saved.colour;

    document.getElementById('btn-continue').addEventListener('click', function () {
      const fields = [
        { id: 'make', label: 'Make' },
        { id: 'model', label: 'Model' },
        { id: 'year', label: 'Year' },
        { id: 'colour', label: 'Colour' },
      ];

      const errors = [];

      fields.forEach(f => {
        clearFieldError(f.id);
        const val = document.getElementById(f.id).value.trim();
        if (!val) {
          setFieldError(f.id, f.label + ' – Enter the vehicle ' + f.label.toLowerCase());
          errors.push({ fieldId: f.id, message: f.label + ' – Enter the vehicle ' + f.label.toLowerCase() });
        }
      });

      // Year format check
      const year = document.getElementById('year').value.trim();
      if (year && !/^\d{4}$/.test(year)) {
        clearFieldError('year');
        setFieldError('year', 'Year – Enter a valid 4-digit year');
        if (!errors.find(e => e.fieldId === 'year')) {
          errors.push({ fieldId: 'year', message: 'Year – Enter a valid 4-digit year' });
        }
      }

      if (errors.length > 0) {
        showErrorSummary(errors);
        return;
      }

      hideErrorSummary();
      saveData({
        make: document.getElementById('make').value.trim(),
        model: document.getElementById('model').value.trim(),
        year: document.getElementById('year').value.trim(),
        colour: document.getElementById('colour').value.trim(),
      }, STORAGE_KEY);
      window.location.href = 'id-numbers.html';
    });
  </script>
</body>
</html>
