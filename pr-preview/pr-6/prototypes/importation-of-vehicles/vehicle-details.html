<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle details – Application for the Importation of Vehicles into Barbados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb-yellow-00': '#e8a833', 'bb-yellow-100': '#ffc726', 'bb-yellow-40': '#ffe9a8', 'bb-yellow-10': '#fff9e9',
            'bb-blue-00': '#00164a', 'bb-blue-100': '#00267f', 'bb-blue-40': '#99a8cc', 'bb-blue-10': '#e5e9f2',
            'bb-black-00': '#000000', 'bb-mid-grey-00': '#595959', 'bb-grey-00': '#e0e4e9', 'bb-white-00': '#ffffff',
            'bb-green-00': '#00654a', 'bb-green-100': '#1fbf84', 'bb-green-40': '#a5e5ce', 'bb-green-10': '#e9f9f3',
            'bb-red-00': '#a42c2c', 'bb-red-100': '#ff6b6b', 'bb-red-40': '#ffc4c4', 'bb-red-10': '#fff0f0',
            'bb-teal-00': '#0e5f64', 'bb-teal-100': '#30c0c8', 'bb-teal-40': '#ace6e9', 'bb-teal-10': '#eaf9f9',
            'bb-purple-00': '#4a235a', 'bb-purple-100': '#a962c7', 'bb-pink-00': '#ad1157', 'bb-pink-100': '#ff94d9',
          },
          fontFamily: { sans: ['Figtree', '-apple-system', 'system-ui', '"Segoe UI"', 'Roboto', 'sans-serif'] },
          spacing: { 'xs': '0.5rem', 's': '1rem', 'xm': '1.5rem', 'm': '2rem', 'l': '4rem', 'xl': '8rem' },
          borderRadius: { 'sm': '0.25rem', 'md': '0.375rem', 'lg': '0.5rem' },
          boxShadow: { 'form-hover': 'inset 4px 4px 0px 0px rgba(0,0,0,0.1)' },
          fontSize: { 'display': '5rem', 'h1': '3.5rem', 'h2': '2.5rem', 'h3': '1.5rem', 'h4': '1.25rem', 'body-lg': '2rem', 'body': '1.25rem', 'caption': '1rem' },
        },
      },
    }
  </script>
  <style>
    body { font-family: Figtree, -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif; font-weight: 400; font-size: 1.25rem; line-height: 1.5; display: grid; min-height: 100vh; grid-template-rows: auto 1fr auto; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="py-m">
    <div class="container mx-auto px-4">
      <div class="max-w-[720px]">
        <a href="applicant-details.html" class="inline-flex items-center gap-xs outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 mb-m block">← Back</a>

        <div id="error-summary" class="hidden bg-bb-red-10 border-2 border-bb-red-00 p-m mb-m" tabindex="-1" role="alert">
          <h2 class="font-bold text-[1.5rem] mb-s">There is a problem</h2>
          <ul id="error-summary-list" class="list-disc pl-m space-y-xs"></ul>
        </div>

        <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-xs">Application for the Importation of Vehicles into Barbados</p>
        <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-m">Vehicle details</h1>

        <form novalidate class="space-y-8">

          <!-- Make -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="iov-make-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="iov-make" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Make</label>
            <div id="iov-make-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="iov-make" name="iov-make" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Model -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="iov-model-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="iov-model" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Model</label>
            <div id="iov-model-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="iov-model" name="iov-model" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Year -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="iov-year-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="iov-year" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Year</label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 2023</p>
            <div id="iov-year-wrapper" class="relative inline-flex rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:8rem;">
              <input type="text" id="iov-year" name="iov-year" inputmode="numeric" maxlength="4" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Colour -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="iov-colour-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="iov-colour" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Colour</label>
            <div id="iov-colour-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="iov-colour" name="iov-colour" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Chassis number -->
          <div class="flex flex-col gap-xs w-full items-start">
            <p id="iov-chassis-error" class="hidden text-[1.1rem] text-bb-red-00 font-bold" role="alert"></p>
            <label for="iov-chassis" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Chassis number</label>
            <div id="iov-chassis-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="iov-chassis" name="iov-chassis" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Engine number (optional) -->
          <div class="flex flex-col gap-xs w-full items-start">
            <label for="iov-engine" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Engine number <span class="font-normal text-bb-mid-grey-00">(optional)</span></label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">Leave blank if vehicle has a motor number</p>
            <div id="iov-engine-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="iov-engine" name="iov-engine" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <!-- Motor number (optional) -->
          <div class="flex flex-col gap-xs w-full items-start">
            <label for="iov-motor" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">Motor number <span class="font-normal text-bb-mid-grey-00">(optional)</span></label>
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">Leave blank if vehicle has an engine number</p>
            <div id="iov-motor-wrapper" class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center gap-2 transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
              <input type="text" id="iov-motor" name="iov-motor" class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
            </div>
          </div>

          <div class="mt-8 flex gap-4">
            <button type="button" id="btn-continue"
              class="relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-teal-00 text-bb-white-00 hover:bg-[#1a777d] px-xm py-s rounded-sm leading-[1.7] focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100">
              Continue
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="bg-bb-blue-100 text-white"></footer>

  <script src="../shared/chrome.js"></script>
  <script>
    const STORAGE_KEY = 'importation-of-vehicles';
    injectChrome();

    const saved = getData(STORAGE_KEY);
    ['iov-make', 'iov-model', 'iov-year', 'iov-colour', 'iov-chassis', 'iov-engine', 'iov-motor'].forEach(id => {
      const el = document.getElementById(id);
      if (el && saved[id]) el.value = saved[id];
    });

    const requiredFields = ['iov-make', 'iov-model', 'iov-year', 'iov-colour', 'iov-chassis'];
    const labels = { 'iov-make': 'Make', 'iov-model': 'Model', 'iov-year': 'Year', 'iov-colour': 'Colour', 'iov-chassis': 'Chassis number' };

    function setError(fieldId, message) {
      const errorEl = document.getElementById(fieldId + '-error');
      const wrapperEl = document.getElementById(fieldId + '-wrapper');
      if (errorEl) { errorEl.textContent = message; errorEl.classList.remove('hidden'); }
      if (wrapperEl) { wrapperEl.classList.remove('border-bb-black-00'); wrapperEl.classList.add('border-bb-red-00'); }
      const inputEl = document.getElementById(fieldId);
      if (inputEl) inputEl.setAttribute('aria-invalid', 'true');
    }

    function clearError(fieldId) {
      const errorEl = document.getElementById(fieldId + '-error');
      const wrapperEl = document.getElementById(fieldId + '-wrapper');
      if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }
      if (wrapperEl) { wrapperEl.classList.remove('border-bb-red-00'); wrapperEl.classList.add('border-bb-black-00'); }
      const inputEl = document.getElementById(fieldId);
      if (inputEl) inputEl.removeAttribute('aria-invalid');
    }

    document.getElementById('btn-continue').addEventListener('click', function () {
      requiredFields.forEach(id => clearError(id));
      const errors = [];
      const values = {};

      ['iov-make', 'iov-model', 'iov-year', 'iov-colour', 'iov-chassis', 'iov-engine', 'iov-motor'].forEach(id => {
        const el = document.getElementById(id);
        values[id] = el ? el.value.trim() : '';
      });

      requiredFields.forEach(id => {
        if (!values[id]) {
          setError(id, labels[id] + ' – Enter ' + labels[id].toLowerCase());
          errors.push({ id, label: labels[id] });
        }
      });

      if (errors.length > 0) {
        const summary = document.getElementById('error-summary');
        const list = document.getElementById('error-summary-list');
        list.innerHTML = '';
        errors.forEach(e => {
          const li = document.createElement('li');
          const msg = document.getElementById(e.id + '-error').textContent;
          li.innerHTML = `<a href="#${e.id}" class="text-bb-red-00 underline">${msg}</a>`;
          list.appendChild(li);
        });
        summary.classList.remove('hidden');
        document.title = 'Error: Vehicle details – Application for the Importation of Vehicles into Barbados';
        summary.focus();
        return;
      }

      document.getElementById('error-summary').classList.add('hidden');
      saveData(values, STORAGE_KEY);
      window.location.href = 'fuel-type.html';
    });
  </script>
</body>
</html>
